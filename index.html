<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Zeka Sarayı</title>
    <style>
        :root { --p: #ff007f; --s: #ffe4f1; --d: #ad1457; --w: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Comic Sans MS', cursive; background: var(--s); 
            margin: 0; padding: 0; text-align: center; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        header { background: var(--p); color: white; padding: 8px 0; flex-shrink: 0; }
        .asel-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        h1 { margin: 0; font-size: 16px; }

        /* Yatay Kaydırılabilir Kompakt Menü */
        .nav-wrapper { 
            background: white; padding: 5px; border-bottom: 2px solid var(--p); 
            overflow-x: auto; white-space: nowrap; flex-shrink: 0;
            display: flex; gap: 6px; padding-left: 10px;
        }
        .menu-item { 
            display: inline-flex; flex-direction: column; align-items: center; 
            padding: 4px; border: 1px solid var(--p); border-radius: 8px; 
            min-width: 50px; background: white; flex-shrink: 0;
        }
        .menu-item.active { background: var(--p); color: white; }
        .menu-item span { font-size: 18px; }
        .menu-item small { font-size: 7px; font-weight: bold; }

        /* Oyun Alanı */
        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; justify-content: center; }
        #instruction { font-weight: bold; color: var(--d); margin-bottom: 5px; font-size: 15px; }
        .game-card { 
            background: white; padding: 10px; border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; 
            height: 100%; max-height: 420px; margin: 0 auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* Grid Ayarları (Zor Mod) */
        .grid-4x4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 100%; }
        .tile { font-size: 24px; background: #fff0f6; border: 2px solid var(--p); border-radius: 10px; height: 65px; display: flex; align-items: center; justify-content: center; }
        
        .btn-action { background: var(--d); color: white; border: none; padding: 8px 15px; border-radius: 15px; margin: 4px; font-size: 14px; }
        .emoji-big { font-size: 55px; margin: 5px; cursor: pointer; transition: 0.2s; }

        /* Toast Bildirimler */
        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 25px; border-radius: 25px; font-size: 16px; font-weight: bold; 
            z-index: 2000; display: none; text-align: center; width: 75%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); animation: pop 0.3s ease-out;
        }
        .toast-success { background: #4caf50; color: white; }
        .toast-fail { background: #ff9800; color: white; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast"></div>

<header>
    <img src="XFUT2204.JPG" onerror="this.src='https://via.placeholder.com/50/FF007F/FFFFFF?text=Asel'" class="asel-img">
    <h1>Asel'in Zeka Sarayı</h1>
</header>

<div class="nav-wrapper" id="navbar"></div>

<div id="game-view">
    <div id="instruction">Asel, bir oyun seçelim!</div>
    <div class="game-card" id="stage">
        <div style="font-size: 60px;">🎮</div>
        <h3 style="margin: 5px;">Hadi Başlayalım!</h3>
        <p style="font-size: 12px;">Yukarıdaki menüden bir oyun seç.</p>
    </div>
</div>

<script>
    const toast = document.getElementById('toast');
    function showMsg(msg, isSuccess) {
        toast.innerText = msg;
        toast.className = isSuccess ? 'toast-success' : 'toast-fail';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1800);
    }

    const games = [
        {id:'m1', icon:'🧠', label:'Hafıza', t:'Aynı Kartları Bul!'},
        {id:'m2', icon:'👀', label:'Farklı', t:'Sence Hangisi Farklı?'},
        {id:'m3', icon:'🔢', label:'Topla', t:'Sayıları Toplayalım!'},
        {id:'m4', icon:'🎨', label:'Renk', t:'Pembeye Dokun!'},
        {id:'m5', icon:'🍎', label:'Say', t:'Kaç Tane Var?'},
        {id:'m6', icon:'📐', label:'Şekil', t:'Kareyi Bulabilir misin?'},
        {id:'m7', icon:'✍️', label:'Çiz', t:'Parmağınla Resim Yap'},
        {id:'m8', icon:'➡️', label:'Yön', t:'Yukarı Bakan Ok Hangisi?'},
        {id:'m9', icon:'🐶', label:'Hayvan', t:'Hangisi Hav Hav Der?'},
        {id:'m10', icon:'🎈', label:'Balon', t:'Balonu Hızlıca Yakala!'},
        {id:'m11', icon:'🅰️', label:'Harf', t:'A Harfini Göster!'},
        {id:'m12', icon:'🐘', label:'Boyut', t:'En Küçük Olanı Bul!'},
        {id:'m13', icon:'😊', label:'Duygu', t:'Sence Kim Üzgün?'},
        {id:'m14', icon:'🎹', label:'Sıra', t:'1\'den 16\'ya Kadar Bas!'},
        {id:'m15', icon:'🥦', label:'Besin', t:'Sağlıklı Yiyeceği Seç!'}
    ];

    const navbar = document.getElementById('navbar');
    const stage = document.getElementById('stage');

    games.forEach(g => {
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = `<span>${g.icon}</span><small>${g.label}</small>`;
        div.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            div.classList.add('active');
            document.getElementById('instruction').innerText = g.t;
            play(g.id);
        };
        navbar.appendChild(div);
    });

    function play(id) {
        stage.innerHTML = '';
        if(id === 'm1') {
            let items = ['🦁','🦁','🐯','🐯','🦊','🦊','🐼','🐼','🐨','🐨','🐷','🐷','🦓','🦓','🐸','🐸'].sort(()=>Math.random()-0.5);
            let flipped = [];
            const grid = document.createElement('div'); grid.className = 'grid-4x4';
            items.forEach(e => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = '?';
                b.onclick = () => {
                    if(flipped.length < 2 && b.innerText === '?') {
                        b.innerText = e; flipped.push(b);
                        if(flipped.length === 2) {
                            if(flipped[0].innerText === flipped[1].innerText) {
                                showMsg("Harika! Bir Eşleşme Buldun! 🌟", true); flipped = [];
                            } else {
                                setTimeout(() => { 
                                    showMsg("Neredeyse Oluyordu, Tekrar Dene! ✨", false);
                                    flipped.forEach(x => x.innerText = '?'); flipped = []; 
                                }, 600);
                            }
                        }
                    }
                };
                grid.appendChild(b);
            });
            stage.appendChild(grid);
        } else if(id === 'm3') {
            let a = Math.floor(Math.random()*15)+10, b = Math.floor(Math.random()*10)+5;
            stage.innerHTML = `<h2 style="font-size:45px">${a}+${b}</h2>`;
            [a+b, a+b+2, a+b-2].sort(()=>Math.random()-0.5).forEach(ans => {
                const btn = document.createElement('button'); btn.className = 'btn-action'; btn.innerText = ans;
                btn.onclick = () => {
                    if(ans === a+b) { showMsg("Doğru Cevap! Matematik Kraliçesi! 🧠", true); play('m3'); }
                    else { showMsg("Sayıları Tekrar Sayalım mı? 🚀", false); }
                };
                stage.appendChild(btn);
            });
        } else if(id === 'm14') {
            let cur = 1; let ns = Array.from({length: 16}, (_, i) => i + 1).sort(()=>Math.random()-0.5);
            const g = document.createElement('div'); g.className = 'grid-4x4';
            ns.forEach(n => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = n;
                b.onclick = () => {
                    if(n === cur) { b.style.background = '#c8e6c9'; cur++; if(cur>16){showMsg("Hepsini Sıraladın! 👑", true); play('m14');} }
                    else { showMsg(`${cur} Sayısını Aramaya Ne Dersin? 🔢`, false); }
                };
                g.appendChild(b);
            });
            stage.appendChild(g);
        } else if(id === 'm7') {
            const c = document.createElement('canvas'); c.width=300; c.height=300;
            const ctx = c.getContext('2d'); let d=false;
            const p = (e) => { const r=c.getBoundingClientRect(); return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left, y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}; };
            c.onmousedown=c.ontouchstart=(e)=>{ d=true; ctx.beginPath(); const pos=p(e); ctx.moveTo(pos.x,pos.y); };
            c.onmousemove=c.ontouchmove=(e)=>{ if(!d)return; const pos=p(e); ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle='#ff007f'; ctx.lineTo(pos.x,pos.y); ctx.stroke(); };
            window.onmouseup=window.ontouchend=()=>d=false;
            stage.appendChild(c);
            const bt = document.createElement('button'); bt.className='btn-action'; bt.innerText='Temizle'; bt.onclick=()=>ctx.clearRect(0,0,300,300);
            stage.appendChild(bt);
        } else {
            const logic = {
                'm2': [['🍓','🍓','🍓','🍓','🍓','🍓','🍓','🍒'], 7, "İşte Farklı Olan! 🍒", "Hepsi Aynı Değil mi? 🧐"],
                'm4': [['💎','🌸','🍀','🟡'], 1, "Pembe Çiçek! 🌸", "Bu Başka Bir Renk! 🎨"],
                'm5': [['🍎','🍎','🍎','🍎'], 4, "Aferin! 4 Tane! 🍎", "Tekrar Sayalım mı? 🔢"],
                'm6': [['🔺','🟡','⬛','🔷'], 2, "Harika! Bu Bir Kare! ⬛", "Bu Şekil Biraz Farklı! 📐"],
                'm8': [['⬅️','➡️','⬆️','⬇️'], 2, "Yukarı Bakıyor! ⬆️", "Okun Yönüne Dikkat! ➡️"],
                'm9': [['🐱','🐮','🐶','🦁'], 2, "Hav Hav! Köpek! 🐶", "Bu Başka Bir Ses! 🦁"],
                'm11': [['B','A','C','D'], 1, "A Harfini Buldun! ✅", "Bu Harf Biraz Farklı! 🅰️"],
                'm12': [['🐘','🦁','🐰','🐭'], 3, "En Küçüğü Fare! 🐭", "Daha Küçüğü Var mı? 🐘"],
                'm13': [['😊','😢','😡','😴'], 1, "Üzgün Arkadaşı Buldun! 😢", "Bu Başka Bir Duygu! 😊"],
                'm15': [['🍕','🍭','🥦','🍟'], 2, "Brokoli Çok Sağlıklı! 🥦", "Bu Dişlerimizi Üzebilir! 🍭"],
                'm10': [['🎈'], 0, "GÜÜÜM! Harika! 💥", "Kaçırma Patlat! 🎈"]
            };
            const d = logic[id];
            d[0].forEach((item, idx) => {
                const b = document.createElement('div'); b.className = 'emoji-big'; b.innerText = item;
                b.onclick = () => {
                    if(idx === d[1]) { showMsg(d[2], true); play(id); }
                    else { showMsg(d[3], false); }
                };
                stage.appendChild(b);
            });
        }
    }
</script>
</body>
</html>
