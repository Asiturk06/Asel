<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Aksiyon Dünyası</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --s: #fff0f6; --d: #ad1457; --y: #4caf50; --o: #ff9800; --b: #2196f3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Varela Round', sans-serif; touch-action: none; }
        body { background: var(--s); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        #stats { font-size: 14px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 12px; }
        .nav-wrapper { background: white; padding: 5px; border-bottom: 2px solid var(--p); display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; flex-shrink: 0; }
        .menu-item { display: flex; align-items: center; justify-content: center; padding: 10px 0; border-radius: 10px; border: 1px solid #eee; background: #fff; font-size: 20px; cursor: pointer; }
        .menu-item.active { background: var(--p); color: white; border-color: var(--p); }
        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; position: relative; align-items: center; }
        #stage { background: #fff; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; height: 100%; max-height: 420px; position: relative; overflow: hidden; }
        .game-obj { position: absolute; pointer-events: none; }
        .brick { position: absolute; border: 1px solid white; border-radius: 4px; }
        .drop { position: absolute; font-size: 25px; pointer-events: auto; cursor: pointer; animation: fall 3.5s linear forwards; z-index: 100; }
        @keyframes fall { to { transform: translateY(450px); } }
        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); padding: 15px 25px; border-radius: 25px; z-index: 10000; display: none; text-align: center; width: 80%; font-weight: bold; color: white; }
    </style>
</head>
<body>
<div id="toast"></div>
<header>
    <div style="font-weight:bold;">Asel ❤️</div>
    <div id="stats">P: <span id="pts">0</span> | L: <span id="lvl">1</span></div>
</header>
<div class="nav-wrapper" id="navbar"></div>
<div id="game-view"><div id="stage"></div></div>

<script>
    const stage = document.getElementById('stage');
    const ptsDisp = document.getElementById('pts');
    const lvlDisp = document.getElementById('lvl');
    const toast = document.getElementById('toast');
    let score = 0, level = 1, gameLoop = null, intervals = [];

    function msg(t, ok) { 
        toast.innerText = t; toast.style.background = ok ? 'var(--y)' : 'var(--o)'; 
        toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 1200); 
    }

    function clearSystem() {
        intervals.forEach(clearInterval); intervals = [];
        if(gameLoop) cancelAnimationFrame(gameLoop);
        stage.innerHTML = ''; stage.onpointermove = null; stage.onpointerdown = null;
        stage.style.background = "#fff";
    }

    const menu = [
        {id:'pb', icon:'⚾'}, {id:'war', icon:'🚀'}, {id:'car', icon:'🏎️'}, 
        {id:'run', icon:'🏃'}, {id:'memo', icon:'🧠'}, {id:'count', icon:'🍎'}, 
        {id:'draw', icon:'✍️'}, {id:'sort', icon:'🎹'}
    ];

    menu.forEach(m => {
        const d = document.createElement('div'); d.className = 'menu-item'; d.innerHTML = m.icon;
        d.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(x => x.classList.remove('active'));
            d.classList.add('active'); clearSystem(); play(m.id);
        };
        document.getElementById('navbar').appendChild(d);
    });

    function play(id) {
        ptsDisp.innerText = score; lvlDisp.innerText = level;

        if(id === 'pb') { // PINBALL 30 SEVİYE + DROPLAR
            let bx=150, by=250, dx=3, dy=-3, ballAlev = false, weaponOn = false;
            stage.innerHTML = `<div id="pad" style="position:absolute;bottom:10px;left:135px;width:80px;height:12px;background:var(--b);border-radius:10px;z-index:10"></div>
                               <div id="ball" style="position:absolute;width:15px;height:15px;background:red;border-radius:50%;z-index:5"></div>`;
            const pad = stage.querySelector('#pad'), ball = stage.querySelector('#ball');
            let bricks = [];
            let rowCount = 3 + Math.floor(level/5);
            for(let r=0; r<rowCount; r++){
                for(let c=0; c<6; c++){
                    const b = document.createElement('div'); b.className = 'brick';
                    b.style.width='50px'; b.style.height='15px'; b.style.left=(c*57+5)+'px'; b.style.top=(r*20+40)+'px';
                    b.style.background = (r % 2 === 0) ? 'var(--p)' : 'purple';
                    stage.appendChild(b); bricks.push(b);
                }
            }
            stage.onpointermove = (e) => {
                let x = e.clientX - stage.getBoundingClientRect().left - 40;
                pad.style.left = Math.max(0, Math.min(x, stage.clientWidth - 80)) + 'px';
            };
            function loopPb() {
                bx += dx; by += dy;
                if(bx <= 0 || bx >= stage.clientWidth-15) dx *= -1;
                if(by <= 0) dy *= -1;
                if(by >= stage.clientHeight-35) {
                    let pr = pad.getBoundingClientRect(), br = ball.getBoundingClientRect();
                    if(br.right > pr.left && br.left < pr.right) { dy = -Math.abs(dy); }
                    else if(by > stage.clientHeight) { msg("Tekrar!", false); play('pb'); return; }
                }
                bricks.forEach((b, i) => {
                    let br = b.getBoundingClientRect(), blr = ball.getBoundingClientRect();
                    if(blr.bottom > br.top && blr.top < br.bottom && blr.right > br.left && blr.left < br.right) {
                        if(!ballAlev) dy *= -1;
                        b.remove(); bricks.splice(i,1); score += 10; ptsDisp.innerText = score;
                        if(Math.random() > 0.85) spawnDrop(br.left, br.top, (t)=>{
                            if(t === '🔥'){ ballAlev=true; ball.style.background='orange'; setTimeout(()=>{ballAlev=false; ball.style.background='red';},8000); }
                            if(t === '🔫'){ activatePadGun(pad, bricks); }
                        }, ['🔥','🔫']);
                        if(bricks.length===0){ level++; msg("Harika!",true); play('pb'); }
                    }
                });
                ball.style.left = bx+'px'; ball.style.top = by+'px';
                gameLoop = requestAnimationFrame(loopPb);
            }
            loopPb();
        }

        else if(id === 'car') { // DİKEY ARABA YARIŞI
            stage.style.background = "#333";
            stage.innerHTML = `
                <div style="position:absolute;width:100%;height:100%;border-left:5px dashed white;border-right:5px dashed white;"></div>
                <div id="mycar" style="position:absolute;bottom:20px;left:140px;font-size:45px;z-index:20">🏎️</div>
            `;
            const mycar = stage.querySelector('#mycar');
            stage.onpointermove = (e) => {
                let x = e.clientX - stage.getBoundingClientRect().left - 22;
                mycar.style.left = Math.max(10, Math.min(x, stage.clientWidth - 50)) + 'px';
            };
            intervals.push(setInterval(() => {
                const obs = document.createElement('div'); obs.className='game-obj'; obs.innerText='🚘';
                obs.style.top='-60px'; obs.style.left=(20 + Math.random()*60)+'%'; obs.style.fontSize='40px';
                obs.style.transform = "rotate(180deg)"; stage.appendChild(obs);
                let oy = -60; let om = setInterval(() => {
                    oy += (4 + level); obs.style.top = oy + 'px';
                    let cr = mycar.getBoundingClientRect(), or = obs.getBoundingClientRect();
                    if(or.bottom > cr.top+10 && or.top < cr.bottom-10 && or.left < cr.right-10 && or.right > cr.left+10) {
                        msg("Çarptın!", false); obs.remove(); clearInterval(om);
                    }
                    if(oy > 450){ obs.remove(); clearInterval(om); score+=5; ptsDisp.innerText=score; if(score%200===0){level++; msg("Seviye "+level,true);} }
                }, 20);
            }, 1200 - (level*20)));
        }

        else if(id === 'war') { // UZAY SAVAŞI
            stage.style.background = "#000";
            stage.innerHTML = `<div id="ship" style="position:absolute;bottom:10px;left:145px;font-size:45px">🚀</div>`;
            const ship = stage.querySelector('#ship');
            let gunMode = 'normal';
            stage.onpointermove = (e) => {
                let x = e.clientX - stage.getBoundingClientRect().left - 22;
                ship.style.left = Math.max(0, Math.min(x, stage.clientWidth - 45)) + 'px';
            };
            intervals.push(setInterval(() => {
                const fires = gunMode === 'triple' ? [-20, 0, 20] : [0];
                fires.forEach(fX => {
                    const l = document.createElement('div'); l.innerText='🔥'; l.className='game-obj';
                    l.style.left = (ship.offsetLeft + 15 + fX) + 'px'; l.style.bottom = '50px'; stage.appendChild(l);
                    let ly=50; let lm = setInterval(() => {
                        ly += 10; l.style.bottom = ly + 'px';
                        stage.querySelectorAll('.enemy').forEach(en => {
                            let er = en.getBoundingClientRect(), lr = l.getBoundingClientRect();
                            if(lr.top < er.bottom && lr.left < er.right && lr.right > er.left){
                                en.remove(); l.remove(); clearInterval(lm); score+=10; ptsDisp.innerText=score;
                                if(Math.random()>0.8) spawnDrop(er.left, er.top, (t)=>{ gunMode='triple'; setTimeout(()=>gunMode='normal',7000); }, ['💎']);
                            }
                        });
                        if(ly>420){ l.remove(); clearInterval(lm); }
                    }, 20);
                });
            }, 500));
            intervals.push(setInterval(() => {
                const e = document.createElement('div'); e.className='enemy game-obj'; e.innerText='👾';
                e.style.top='-40px'; e.style.left=Math.random()*85+'%'; e.style.fontSize='35px';
                stage.appendChild(e);
                let ey = -40; let em = setInterval(() => {
                    ey += (2 + level*0.3); e.style.top = ey + 'px';
                    if(ey > 420) { e.remove(); clearInterval(em); }
                }, 20);
            }, 1000));
        }

        else if(id === 'memo') { // HAFIZA 30 BÖLÜM
            let pairs = 2 + Math.floor(level/2); if(pairs>12) pairs=12;
            let emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮'].slice(0, pairs);
            let items = [...emojis, ...emojis].sort(()=>Math.random()-0.5);
            stage.innerHTML = `<div id="mgrid" style="display:grid;grid-template-columns:repeat(${pairs > 6 ? 4 : 3}, 1fr);gap:8px;padding:15px"></div>`;
            let op = [];
            items.forEach(v => {
                const t = document.createElement('div'); t.style.cssText="height:55px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:25px;border-radius:10px;cursor:pointer";
                t.innerText = '?'; t.onclick = () => {
                    if(op.length<2 && t.innerText==='?'){ t.innerText=v; op.push(t);
                        if(op.length===2){ 
                            if(op[0].innerText===op[1].innerText){ score+=20; ptsDisp.innerText=score; op=[]; if(![...stage.querySelectorAll('div')].some(d=>d.innerText==='?')){ level++; msg("Harika!",true); play('memo'); } }
                            else { setTimeout(()=>{op.forEach(x=>x.innerText='?'); op=[];}, 500); } 
                        }
                    }
                }; stage.querySelector('#mgrid').appendChild(t);
            });
        }

        else if(id === 'run') { // ZIPLA KAÇ
            stage.innerHTML = `<div id="runner" style="position:absolute;bottom:20px;left:40px;font-size:45px;z-index:10">🏃</div>
                               <div style="position:absolute;bottom:20px;width:100%;height:4px;background:#555"></div>`;
            const r = stage.querySelector('#runner'); let jump = false;
            stage.onpointerdown = () => { if(!jump){ jump=true; r.style.transition='bottom 0.35s ease-out'; r.style.bottom='140px'; 
                setTimeout(()=>{r.style.bottom='20px'; setTimeout(()=>jump=false, 350);}, 350); } 
            };
            intervals.push(setInterval(() => {
                const obs = document.createElement('div'); obs.className='game-obj'; obs.innerText='🌵';
                obs.style.bottom='20px'; obs.style.left='350px'; obs.style.fontSize='35px'; stage.appendChild(obs);
                let ox = 350; let om = setInterval(() => {
                    ox -= (5 + level); obs.style.left = ox + 'px';
                    let rr = r.getBoundingClientRect(), or = obs.getBoundingClientRect();
                    if(or.left < rr.right-15 && or.right > rr.left+15 && rr.bottom > or.top+10) { msg("Zıpla!", false); }
                    if(ox < -50) { obs.remove(); clearInterval(om); score+=10; ptsDisp.innerText=score; if(score%200===0) level++; }
                }, 20);
            }, 1800));
        }

        else if(id === 'count') { // SAYMA
            let n = Math.floor(Math.random()*6)+3;
            stage.innerHTML = `<div style="font-size:40px;text-align:center;margin:30px">${'🍓'.repeat(n)}</div>`;
            [n, n+1, n-1].sort(()=>Math.random()-0.5).forEach(a => {
                const b = document.createElement('button'); b.innerText=a; b.style.cssText="width:80%;margin:10px 10%;padding:15px;background:var(--p);color:white;border:none;border-radius:10px;font-size:20px";
                b.onclick=()=>{ if(a===n){ score+=10; msg("Aferin!",true); play('count'); } }; stage.appendChild(b);
            });
        }

        else if(id === 'draw') { // ÇİZİM
            stage.innerHTML = `<canvas id="c" width="340" height="380"></canvas><button id="clr" style="width:100%;padding:10px;background:var(--b);border:none;color:white">TEMİZLE</button>`;
            const can = stage.querySelector('#c'), ctx = can.getContext('2d'); let dr=false;
            can.onpointerdown = (e) => { dr=true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
            can.onpointermove = (e) => { if(dr){ ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle="#ff007f"; } };
            window.onpointerup = () => dr=false;
            stage.querySelector('#clr').onclick = () => ctx.clearRect(0,0,340,380);
        }

        else if(id === 'sort') { // SIRALAMA
            let c=1; let count = 9 + Math.min(level, 6);
            let ns=Array.from({length:count},(_,i)=>i+1).sort(()=>Math.random()-0.5);
            stage.innerHTML = '<div id="sgrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:20px"></div>';
            ns.forEach(n => {
                const b = document.createElement('div'); b.style.cssText="height:60px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:25px;border-radius:10px";
                b.innerText=n; b.onclick=()=>{ if(n===c){ b.style.background="#cfc"; c++; if(c>count){level++; play('sort');} } };
                stage.querySelector('#sgrid').appendChild(b);
            });
        }
    }

    function spawnDrop(x, y, callback, types) {
        const d = document.createElement('div'); d.className = 'drop';
        d.innerText = types[Math.floor(Math.random()*types.length)];
        d.style.left = x + 'px'; d.style.top = y + 'px';
        stage.appendChild(d);
        let check = setInterval(() => {
            let dr = d.getBoundingClientRect(), pr = (stage.querySelector('#pad') || stage.querySelector('#ship')).getBoundingClientRect();
            if(dr.bottom > pr.top && dr.left < pr.right && dr.right > pr.left) {
                msg("ÖZELLİK!", true); d.remove(); clearInterval(check); callback(d.innerText);
            }
            if(dr.top > 450) { d.remove(); clearInterval(check); }
        }, 50);
    }

    function activatePadGun(pad, bricks) {
        let count = 0;
        let si = setInterval(() => {
            [0, 70].forEach(off => {
                const l = document.createElement('div'); l.innerText='^'; l.style.cssText=`position:absolute;left:${pad.offsetLeft+off}px;bottom:25px;font-weight:bold;color:blue`;
                stage.appendChild(l);
                let ly=25; let lm=setInterval(()=>{
                    ly+=7; l.style.bottom=ly+'px';
                    bricks.forEach((b,i)=>{
                        let br=b.getBoundingClientRect(), lr=l.getBoundingClientRect();
                        if(lr.top < br.bottom && lr.left < br.right && lr.right > br.left){
                            b.remove(); bricks.splice(i,1); l.remove(); clearInterval(lm);
                        }
                    });
                    if(ly>420){l.remove(); clearInterval(lm);}
                },20);
            });
            count++; if(count>15) clearInterval(si);
        }, 500);
    }
</script>
</body>
</html>
