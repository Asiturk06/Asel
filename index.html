<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Sarayı</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --s: #fff0f6; --d: #ad1457; --y: #4caf50; --o: #ff9800; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Varela Round', sans-serif; touch-action: manipulation; }
        body { background: var(--s); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--p); color: white; padding: 5px 0; text-align: center; flex-shrink: 0; }
        .asel-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; }
        
        .nav-wrapper { 
            background: white; padding: 5px; border-bottom: 2px solid var(--p); 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; flex-shrink: 0;
        }
        .menu-item { 
            display: flex; justify-content: center; align-items: center; 
            padding: 8px 0; border-radius: 10px; border: 1px solid #eee; background: #fff; font-size: 20px;
        }
        .menu-item.active { background: var(--p); border-color: var(--p); color: white; }

        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; position: relative; }
        #instruction { font-weight: bold; color: var(--d); margin: 5px 0; font-size: 16px; }
        
        .game-card { 
            background: white; border-radius: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%; max-width: 350px; height: 100%; max-height: 400px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 95%; }
        .tile { 
            background: #fff0f6; border: 2px solid var(--p); border-radius: 10px; 
            height: 60px; display: flex; align-items: center; justify-content: center; font-size: 24px;
        }

        .obj { position: absolute; font-size: 60px; cursor: pointer; user-select: none; }
        .btn-ans { background: var(--p); color: white; border: none; padding: 12px; border-radius: 15px; margin: 5px; width: 80%; font-size: 18px; font-weight: bold; }

        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 25px; border-radius: 25px; z-index: 10000; display: none;
            text-align: center; width: 80%; font-weight: bold; color: white;
        }
        .success { background: var(--y); }
        .fail { background: var(--o); }
    </style>
</head>
<body>

<div id="toast"></div>
<header>
    <img src="XFUT2204.JPG" onerror="this.src='https://via.placeholder.com/40/FF007F/FFFFFF?text=A'" class="asel-img">
    <h1 id="title">Asel'in Sarayı</h1>
</header>
<div class="nav-wrapper" id="navbar"></div>
<div id="game-view">
    <div id="instruction">Hoş geldin Asel!</div>
    <div class="game-card" id="stage"></div>
</div>

<script>
    const stage = document.getElementById('stage');
    const instr = document.getElementById('instruction');
    const toast = document.getElementById('toast');
    let activeIntervals = [];

    function clearSystem() {
        activeIntervals.forEach(clearInterval);
        activeIntervals = [];
        stage.innerHTML = '';
        stage.onmousemove = stage.ontouchmove = null;
    }

    function msg(text, ok) {
        toast.innerText = text;
        toast.className = ok ? 'success' : 'fail';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
    }

    const menu = [
        {id:'h1', icon:'🧠', t:'Eşini Bul!'}, {id:'h2', icon:'🍎', t:'Hadi Sayalım!'},
        {id:'a1', icon:'🎈', t:'Balonu Patlat!'}, {id:'a2', icon:'⭐', t:'Yıldızı Yakala!'},
        {id:'a3', icon:'🥚', t:'Yumurtaları Topla!'}, {id:'a4', icon:'🐭', t:'Köstebek Yakala!'},
        {id:'a5', icon:'🛸', t:'UFO\'ya Dokun!'}, {id:'a6', icon:'🎁', t:'Hediyeleri Al!'},
        {id:'h3', icon:'🔢', t:'Sırayla Bas!'}, {id:'h4', icon:'🥦', t:'Sağlıklı Seç!'},
        {id:'h5', icon:'🎨', t:'Resim Çiz!'}, {id:'a7', icon:'🐱', t:'Kediyi Yakala!'},
        {id:'a8', icon:'🐟', t:'Balıkları Kurtar!'}, {id:'a9', icon:'🐝', t:'Arıyı Kovala!'},
        {id:'a10', icon:'🍦', t:'Dondurma Kap!'}
    ];

    const navbar = document.getElementById('navbar');
    menu.forEach(m => {
        const d = document.createElement('div');
        d.className = 'menu-item'; d.innerHTML = m.icon;
        d.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(x => x.classList.remove('active'));
            d.classList.add('active');
            instr.innerText = m.t;
            play(m.id);
        };
        navbar.appendChild(d);
    });

    function play(id) {
        clearSystem();
        if(id === 'h1') { // Hafıza
            let items = ['🐶','🐶','🐱','🐱','🦁','🦁','🐷','🐷','🐯','🐯','🦊','🦊','🐼','🐼','🐸','🐸'].sort(()=>Math.random()-0.5);
            let open = [];
            const g = document.createElement('div'); g.className = 'grid';
            items.forEach(v => {
                const t = document.createElement('div'); t.className = 'tile'; t.innerText = '?';
                t.onclick = () => {
                    if(open.length < 2 && t.innerText === '?') {
                        t.innerText = v; open.push(t);
                        if(open.length === 2) {
                            if(open[0].innerText === open[1].innerText) { msg("Süper! ✨", true); open = []; }
                            else { setTimeout(() => { msg("Dene Asel! ✨", false); open.forEach(x => x.innerText = '?'); open = []; }, 600); }
                        }
                    }
                };
                g.appendChild(t);
            });
            stage.appendChild(g);
        }
        else if(id === 'h2') { // Sayma
            let n = Math.floor(Math.random()*5)+3;
            stage.innerHTML = `<div style="font-size:40px; margin-bottom:20px;">${'🍎'.repeat(n)}</div>`;
            [n, n+1, n-1].sort(()=>Math.random()-0.5).forEach(a => {
                const b = document.createElement('button'); b.className = 'btn-ans'; b.innerText = a;
                b.onclick = () => { if(a === n) { msg("Doğru! 🍎", true); play('h2'); } else { msg("Tekrar Say! 🔢", false); } };
                stage.appendChild(b);
            });
        }
        else if(['a1','a2','a4','a5','a7','a9'].includes(id)) { // Dokunma Aksiyonları
            const icons = {a1:'🎈', a2:'⭐', a4:'🐭', a5:'🛸', a7:'🐱', a9:'🐝'};
            const spawn = () => {
                stage.innerHTML = '';
                const o = document.createElement('div'); o.className = 'obj';
                o.innerText = icons[id];
                o.style.left = (Math.random()*70+10)+'%'; o.style.top = (Math.random()*70+10)+'%';
                o.onclick = () => { msg("Harikasın! 🌟", true); spawn(); };
                stage.appendChild(o);
            };
            spawn();
        }
        else if(id === 'a3' || id === 'a6' || id === 'a8' || id === 'a10') { // Düşenleri Yakala
            const icons = {a3:'🥚', a6:'🎁', a8:'🐟', a10:'🍦'};
            const basket = document.createElement('div'); basket.innerText = '🧺';
            basket.style.cssText = 'position:absolute; bottom:10px; font-size:60px; left:50%; transform:translateX(-50%);';
            stage.appendChild(basket);

            const move = (e) => {
                let x = (e.touches ? e.touches[0].clientX : e.clientX) - stage.getBoundingClientRect().left;
                basket.style.left = Math.max(30, Math.min(x, stage.clientWidth - 30)) + 'px';
            };
            stage.ontouchmove = stage.onmousemove = move;

            activeIntervals.push(setInterval(() => {
                const f = document.createElement('div'); f.className = 'obj'; f.innerText = icons[id];
                f.style.top = '-50px'; f.style.left = (Math.random()*(stage.clientWidth-60))+'px';
                stage.appendChild(f);
                let y = 0;
                let fall = setInterval(() => {
                    y += 4; f.style.top = y + 'px';
                    let r1 = basket.getBoundingClientRect(), r2 = f.getBoundingClientRect();
                    if(r2.bottom > r1.top && r2.left < r1.right && r2.right > r1.left) {
                        msg("Yakaladın! 🎯", true); f.remove(); clearInterval(fall);
                    }
                    if(y > 400) { f.remove(); clearInterval(fall); }
                }, 20);
            }, 1800));
        }
        else if(id === 'h3') { // Sıralama
            let c = 1; let ns = Array.from({length: 16}, (_, i) => i + 1).sort(()=>Math.random()-0.5);
            const g = document.createElement('div'); g.className = 'grid';
            ns.forEach(n => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = n;
                b.onclick = () => {
                    if(n === c) { b.style.background = '#c8e6c9'; c++; if(c>16) { msg("Kraliçesin! 👑", true); play('h3'); } }
                    else { msg(c + " nerede? 🔢", false); }
                };
                g.appendChild(b);
            });
            stage.appendChild(g);
        }
        else if(id === 'h5') { // Çizim
            const can = document.createElement('canvas'); can.width=300; can.height=300; can.style.border="2px dashed var(--p)";
            const ctx = can.getContext('2d'); let d = false;
            const getP = (e) => { let r=can.getBoundingClientRect(); return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left, y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}; };
            can.onmousedown=can.ontouchstart=(e)=>{ d=true; ctx.beginPath(); let p=getP(e); ctx.moveTo(p.x,p.y); };
            can.onmousemove=can.ontouchmove=(e)=>{ if(!d) return; let p=getP(e); ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle='#ff007f'; ctx.lineTo(p.x,p.y); ctx.stroke(); };
            window.onmouseup=window.ontouchend=()=>d=false;
            stage.appendChild(can);
        }
        else {
             stage.innerHTML = '<h3>Yeni Oyun Yükleniyor!</h3>';
        }
    }
</script>
</body>
</html>
