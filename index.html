<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in SarayД± V6</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --s: #fff0f6; --d: #ad1457; --y: #4caf50; --o: #ff9800; --b: #2196f3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Varela Round', sans-serif; touch-action: none; }
        body { background: var(--s); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: var(--p); color: white; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 100; }
        #stats { font-size: 14px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 12px; }
        .nav-wrapper { background: white; padding: 5px; border-bottom: 2px solid var(--p); display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; flex-shrink: 0; }
        .menu-item { display: flex; align-items: center; justify-content: center; padding: 10px 0; border-radius: 8px; border: 1px solid #eee; background: #fff; font-size: 20px; cursor: pointer; }
        .menu-item.active { background: var(--p); color: white; }
        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; position: relative; align-items: center; overflow: hidden; }
        #stage { background: #fff; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; height: 100%; max-height: 420px; position: relative; overflow: hidden; }
        .game-obj { position: absolute; pointer-events: none; }
        .brick { position: absolute; border: 1px solid white; border-radius: 4px; z-index: 5; }
        .drop { position: absolute; font-size: 28px; z-index: 50; }
        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); padding: 15px 25px; border-radius: 25px; z-index: 10000; display: none; text-align: center; width: 80%; font-weight: bold; color: white; }
        
        /* Araba YarД±ЕџД± Yol Г‡izgileri */
        .lane { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
<div id="toast"></div>
<header>
    <div style="font-weight:bold;">Asel вқ¤пёЏ</div>
    <div id="stats">P: <span id="pts">0</span> | Seviye: <span id="lvl">1</span></div>
</header>
<div class="nav-wrapper" id="navbar"></div>
<div id="game-view"><div id="stage"></div></div>

<script>
    const stage = document.getElementById('stage');
    const ptsDisp = document.getElementById('pts');
    const lvlDisp = document.getElementById('lvl');
    const toast = document.getElementById('toast');
    let score = 0, level = 1, activeIntervals = [];

    function msg(t, ok) { 
        toast.innerText = t; toast.style.background = ok ? 'var(--y)' : 'var(--o)'; 
        toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 1200); 
    }

    function clearSystem() {
        activeIntervals.forEach(clearInterval);
        activeIntervals = [];
        stage.innerHTML = '';
        stage.style.background = "#fff";
        stage.onpointermove = null;
        stage.onpointerdown = null;
    }

    const menu = [
        {id:'pb', icon:'вљң'}, {id:'car', icon:'рџЏҺпёЏ'}, {id:'war', icon:'рџљЂ'}, 
        {id:'run', icon:'рџЏѓ'}, {id:'memo', icon:'рџ§ '}, {id:'count', icon:'рџҚҺ'}, 
        {id:'draw', icon:'вњҚпёЏ'}, {id:'sort', icon:'рџҺ№'}
    ];

    menu.forEach(m => {
        const d = document.createElement('div'); d.className = 'menu-item'; d.innerHTML = m.icon;
        d.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(x => x.classList.remove('active'));
            d.classList.add('active'); clearSystem(); play(m.id);
        };
        document.getElementById('navbar').appendChild(d);
    });

    function play(id) {
        ptsDisp.innerText = score; lvlDisp.innerText = level;

        if(id === 'pb') { // PINBALL DГњZELTД°LMД°Еһ
            let bx=150, by=200, dx=3, dy=-3, alev = false;
            stage.innerHTML = `<div id="pad" style="position:absolute;bottom:15px;left:135px;width:80px;height:12px;background:var(--b);border-radius:10px;z-index:100"></div>
                               <div id="ball" style="position:absolute;width:16px;height:16px;background:red;border-radius:50%;z-index:90"></div>`;
            const pad = stage.querySelector('#pad'), ball = stage.querySelector('#ball');
            let bricks = [];
            let rows = Math.min(3 + Math.floor(level/5), 7);
            for(let r=0; r<rows; r++) {
                for(let c=0; c<6; c++) {
                    const b = document.createElement('div'); b.className = 'brick';
                    b.style.width='50px'; b.style.height='16px'; b.style.left=(c*57+5)+'px'; b.style.top=(r*22+40)+'px';
                    b.style.background = (r % 2 === 0) ? 'var(--p)' : 'purple';
                    stage.appendChild(b); bricks.push(b);
                }
            }

            stage.onpointermove = (e) => {
                let rect = stage.getBoundingClientRect();
                let x = (e.clientX || e.touches[0].clientX) - rect.left - 40;
                pad.style.left = Math.max(0, Math.min(x, stage.clientWidth - 80)) + 'px';
            };

            const runPb = setInterval(() => {
                bx += dx; by += dy;
                // Duvar Г§arpma
                if(bx <= 0 || bx >= stage.clientWidth-16) dx *= -1;
                if(by <= 0) dy *= -1;
                // Raket Г§arpma
                if(by >= stage.clientHeight - 40) {
                    let pr = pad.getBoundingClientRect(), br = ball.getBoundingClientRect();
                    if(br.right > pr.left && br.left < pr.right) {
                        dy = -Math.abs(dy); by = stage.clientHeight - 42;
                    } else if(by > stage.clientHeight) {
                        clearInterval(runPb); msg("Yeniden!", false); play('pb');
                    }
                }
                // Blok Г§arpma
                bricks.forEach((b, i) => {
                    let br = b.getBoundingClientRect(), blr = ball.getBoundingClientRect();
                    if(blr.bottom > br.top && blr.top < br.bottom && blr.right > br.left && blr.left < br.right) {
                        if(!alev) dy *= -1;
                        if(Math.random() > 0.8) dropSpawn(br.left, br.top, 'pb');
                        b.remove(); bricks.splice(i, 1); score += 10; ptsDisp.innerText = score;
                        if(bricks.length === 0) { clearInterval(runPb); level++; msg("Harika!", true); play('pb'); }
                    }
                });
                ball.style.left = bx + 'px'; ball.style.top = by + 'px';
                ball.style.background = alev ? 'orange' : 'red';
                ball.style.boxShadow = alev ? '0 0 10px orange' : 'none';
            }, 20);
            activeIntervals.push(runPb);

            window.applyPowerPb = (t) => {
                if(t === 'рџ”Ө') { alev = true; setTimeout(() => alev = false, 8000); }
                if(t === 'рџ”«') { 
                    let shots = 0;
                    let si = setInterval(() => {
                        const l = document.createElement('div'); l.style.cssText=`position:absolute;left:${pad.offsetLeft+35}px;bottom:30px;color:blue;font-weight:bold;z-index:80`;
                        l.innerText='в–І'; stage.appendChild(l);
                        let ly=30; let lm=setInterval(()=>{
                            ly+=8; l.style.bottom=ly+'px';
                            bricks.forEach((b,i)=>{
                                let br=b.getBoundingClientRect(), lr=l.getBoundingClientRect();
                                if(lr.top<br.bottom && lr.left<br.right && lr.right>br.left){ b.remove(); bricks.splice(i,1); l.remove(); clearInterval(lm); score+=10; ptsDisp.innerText=score; }
                            });
                            if(ly>400){l.remove(); clearInterval(lm);}
                        },20);
                        shots++; if(shots > 10) clearInterval(si);
                    }, 600);
                }
            };
        }

        else if(id === 'car') { // 3 ЕһERД°TLД° ARABA YARIЕһI
            stage.style.background = "#444";
            stage.innerHTML = `
                <div class="lane" style="left:33%"></div><div class="lane" style="left:66%"></div>
                <div id="mycar" style="position:absolute;bottom:20px;left:145px;font-size:45px;z-index:100;transition:left 0.1s">рџЏҺпёЏ</div>
            `;
            const mycar = stage.querySelector('#mycar');
            const lanes = [20, 145, 270];
            let currentLane = 1;

            stage.onpointerdown = (e) => {
                let rect = stage.getBoundingClientRect();
                let x = (e.clientX || e.touches[0].clientX) - rect.left;
                if(x < stage.clientWidth/3) currentLane = 0;
                else if(x > stage.clientWidth*2/3) currentLane = 2;
                else currentLane = 1;
                mycar.style.left = lanes[currentLane] + 'px';
            };

            activeIntervals.push(setInterval(() => {
                const obs = document.createElement('div'); obs.className='game-obj'; obs.innerText='рџљ”';
                obs.style.cssText = `top:-60px; left:${lanes[Math.floor(Math.random()*3)]}px; font-size:40px; z-index:50;`;
                stage.appendChild(obs);
                let oy = -60;
                let om = setInterval(() => {
                    oy += (5 + level); obs.style.top = oy + 'px';
                    let cr = mycar.getBoundingClientRect(), or = obs.getBoundingClientRect();
                    if(or.bottom > cr.top+15 && or.top < cr.bottom-15 && or.left < cr.right-10 && or.right > cr.left+10) {
                        msg("Dikkat!", false); obs.remove(); clearInterval(om);
                    }
                    if(oy > 450) { obs.remove(); clearInterval(om); score+=20; ptsDisp.innerText=score; if(score%400===0){level++; msg("Lvl Up!",true);} }
                }, 20);
            }, 1200 - (level*30)));
        }

        else if(id === 'war') { // UZAY SAVAЕһI
            stage.style.background = "#000";
            stage.innerHTML = `<div id="ship" style="position:absolute;bottom:15px;left:145px;font-size:45px;z-index:100">рџљЂ</div>`;
            const ship = stage.querySelector('#ship');
            let triple = false;
            stage.onpointermove = (e) => {
                let rect = stage.getBoundingClientRect();
                let x = (e.clientX || e.touches[0].clientX) - rect.left - 22;
                ship.style.left = Math.max(0, Math.min(x, stage.clientWidth - 45)) + 'px';
            };
            activeIntervals.push(setInterval(() => {
                const shots = triple ? [-25, 0, 25] : [0];
                shots.forEach(sx => {
                    const l = document.createElement('div'); l.innerText='рџ”Ө'; l.style.cssText=`position:absolute;left:${ship.offsetLeft+15+sx}px;bottom:55px;z-index:80`;
                    stage.appendChild(l);
                    let ly=55; let lm=setInterval(()=>{
                        ly+=10; l.style.bottom=ly+'px';
                        stage.querySelectorAll('.enemy').forEach(en => {
                            let er=en.getBoundingClientRect(), lr=l.getBoundingClientRect();
                            if(lr.top<er.bottom && lr.left<er.right && lr.right>er.left){
                                if(Math.random()>0.85) dropSpawn(er.left, er.top, 'war');
                                en.remove(); l.remove(); clearInterval(lm); score+=10; ptsDisp.innerText=score;
                            }
                        });
                        if(ly>420){l.remove(); clearInterval(lm);}
                    }, 20);
                });
            }, 500));
            activeIntervals.push(setInterval(() => {
                const en = document.createElement('div'); en.className='enemy game-obj'; en.innerText='рџ‘ң';
                en.style.cssText=`top:-40px;left:${Math.random()*85}%;font-size:38px;z-index:50`;
                stage.appendChild(en);
                let ey=-40; let em=setInterval(()=>{
                    ey+=(2+level*0.3); en.style.top=ey+'px';
                    if(ey>450){en.remove(); clearInterval(em);}
                }, 20);
            }, 1000));
            window.applyPowerWar = () => { triple=true; setTimeout(()=>triple=false, 8000); };
        }

        else if(id === 'memo') { // HAFIZA 30 BГ–LГњM
            let pairs = Math.min(2 + Math.floor(level/2), 12);
            let emo = ['рџђ¶','рџђ±','рџђ­','рџђ№','рџђ°','рџ¦Љ','рџђ»','рџђә','рџђЁ','рџђҮ','рџ¦Ѓ','рџђ®'].slice(0, pairs);
            let items = [...emo, ...emo].sort(()=>Math.random()-0.5);
            stage.innerHTML = `<div id="g" style="display:grid;grid-template-columns:repeat(${pairs>6?4:3},1fr);gap:8px;padding:10px"></div>`;
            let op = [];
            items.forEach(v => {
                const t = document.createElement('div'); t.style.cssText="height:60px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:30px;border-radius:10px;cursor:pointer";
                t.innerText = '?'; t.onclick = () => {
                    if(op.length<2 && t.innerText==='?'){ t.innerText=v; op.push(t);
                        if(op.length===2){
                            if(op[0].innerText===op[1].innerText){ score+=50; ptsDisp.innerText=score; op=[]; if(![...stage.querySelectorAll('div')].some(d=>d.innerText==='?')){ level++; msg("SГәper!",true); play('memo'); } }
                            else { setTimeout(()=>{op.forEach(x=>x.innerText='?'); op=[];}, 500); }
                        }
                    }
                }; stage.querySelector('#g').appendChild(t);
            });
        }
        else if(id === 'run') { // ZIPLA KAГ‡
            stage.innerHTML = `<div id="runr" style="position:absolute;bottom:20px;left:40px;font-size:45px;z-index:100">рџЏѓ</div>
                               <div style="position:absolute;bottom:20px;width:100%;height:4px;background:#555"></div>`;
            const r = stage.querySelector('#runr'); let j = false;
            stage.onpointerdown = () => { if(!j){ j=true; r.style.transition='bottom 0.35s'; r.style.bottom='140px'; setTimeout(()=>{r.style.bottom='20px'; setTimeout(()=>j=false, 350);}, 350); } };
            activeIntervals.push(setInterval(() => {
                const o = document.createElement('div'); o.className='game-obj'; o.innerText='рџЊµ';
                o.style.cssText=`bottom:20px;left:350px;font-size:35px;z-index:50`; stage.appendChild(o);
                let ox=350; let om=setInterval(()=>{
                    ox-=(5+level); o.style.left=ox+'px';
                    let rr=r.getBoundingClientRect(), or=o.getBoundingClientRect();
                    if(or.left<rr.right-15 && or.right>rr.left+15 && rr.bottom>or.top+10){ msg("ZД±pla!",false); }
                    if(ox<-50){o.remove(); clearInterval(om); score+=10; ptsDisp.innerText=score;}
                }, 20);
            }, 1800));
        }
        else if(id === 'count') {
            let n = Math.floor(Math.random()*6)+3;
            stage.innerHTML = `<div style="font-size:50px;text-align:center;margin:40px">${'рџҚҺ'.repeat(n)}</div>`;
            [n, n+1, n-1].sort(()=>Math.random()-0.5).forEach(a => {
                const b = document.createElement('button'); b.innerText=a; b.style.cssText="width:80%;margin:10px 10%;padding:15px;background:var(--p);color:white;border:none;border-radius:10px;font-size:24px";
                b.onclick=()=>{ if(a===n){ score+=20; msg("Aferin!",true); play('count'); } }; stage.appendChild(b);
            });
        }
        else if(id === 'draw') {
            stage.innerHTML = `<canvas id="cv" width="340" height="360"></canvas><button id="cl" style="width:100%;padding:10px;background:var(--b);color:white;border:none">SД°L</button>`;
            const c=stage.querySelector('#cv'), x=c.getContext('2d'); let d=false;
            c.onpointerdown=(e)=>{d=true; x.beginPath(); x.moveTo(e.offsetX,e.offsetY);};
            c.onpointermove=(e)=>{if(d){x.lineTo(e.offsetX,e.offsetY); x.stroke(); x.lineWidth=5; x.lineCap='round'; x.strokeStyle="#ff007f";}};
            window.onpointerup=()=>d=false; stage.querySelector('#cl').onclick=()=>x.clearRect(0,0,340,360);
        }
        else if(id === 'sort') {
            let c=1; let cnt=Math.min(9+level, 15);
            let ns=Array.from({length:cnt},(_,i)=>i+1).sort(()=>Math.random()-0.5);
            stage.innerHTML = `<div id="sg" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:20px"></div>`;
            ns.forEach(n => {
                const b = document.createElement('div'); b.style.cssText="height:60px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:25px;border-radius:10px";
                b.innerText=n; b.onclick=()=>{ if(n===c){ b.style.background="#cfc"; c++; if(c>cnt){score+=100; level++; play('sort');} } };
                stage.querySelector('#sg').appendChild(b);
            });
        }
    }

    function dropSpawn(x, y, g) {
        const d = document.createElement('div'); d.className = 'drop';
        const t = g === 'pb' ? ['рџ”Ө', 'рџ”«'] : ['рџ’Һ'];
        d.innerText = t[Math.floor(Math.random()*t.length)];
        d.style.left = x + 'px'; d.style.top = y + 'px';
        stage.appendChild(d);
        let dy = y;
        let dm = setInterval(() => {
            dy += 3; d.style.top = dy + 'px';
            let dr = d.getBoundingClientRect();
            let target = stage.querySelector(g === 'pb' ? '#pad' : '#ship');
            if(!target) { clearInterval(dm); return; }
            let tr = target.getBoundingClientRect();
            if(dr.bottom > tr.top && dr.left < tr.right && dr.right > tr.left) {
                d.remove(); clearInterval(dm); msg("GГњГ‡!", true);
                if(g === 'pb') window.applyPowerPb(d.innerText);
                else window.applyPowerWar();
            }
            if(dy > 420) { d.remove(); clearInterval(dm); }
        }, 20);
    }
</script>
</body>
</html>
