<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Oyun Sarayı</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --s: #fff0f6; --d: #ad1457; --y: #4caf50; --o: #ff9800; --b: #2196f3; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Varela Round', sans-serif; touch-action: none; }
        body { background: var(--s); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--p); color: white; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .asel-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; }
        #stats { font-size: 14px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 12px; }

        .nav-wrapper { 
            background: white; padding: 5px; border-bottom: 2px solid var(--p); 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; flex-shrink: 0;
        }
        .menu-item { display: flex; align-items: center; justify-content: center; padding: 10px 0; border-radius: 10px; border: 1px solid #eee; background: #fff; font-size: 20px; cursor: pointer; }
        .menu-item.active { background: var(--p); color: white; border-color: var(--p); }

        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; position: relative; align-items: center; }
        #instruction { font-weight: bold; color: var(--d); margin: 5px 0; font-size: 15px; text-align: center; }
        
        #stage { 
            background: #fff; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%; max-width: 350px; height: 100%; max-height: 400px;
            position: relative; overflow: hidden;
        }

        .brick { position: absolute; border: 1px solid white; border-radius: 4px; }
        .game-obj { position: absolute; user-select: none; }
        .tile { background: #fff0f6; border: 2px solid var(--p); border-radius: 10px; height: 55px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        
        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 25px; border-radius: 25px; z-index: 10000; display: none;
            text-align: center; width: 80%; font-weight: bold; color: white;
        }
    </style>
</head>
<body>

<div id="toast"></div>
<header>
    <img src="XFUT2204.JPG" onerror="this.src='https://via.placeholder.com/40/FF007F/FFFFFF?text=A'" class="asel-img">
    <div id="stats">Puan: <span id="pts">0</span> | Seviye: <span id="lvl">1</span></div>
</header>
<div class="nav-wrapper" id="navbar"></div>
<div id="game-view">
    <div id="instruction">Hoş Geldin Asel! 🌟</div>
    <div id="stage"></div>
</div>

<script>
    const stage = document.getElementById('stage');
    const ptsDisp = document.getElementById('pts');
    const lvlDisp = document.getElementById('lvl');
    const toast = document.getElementById('toast');
    let score = 0, level = 1, loop = null, activeIntervals = [];

    function msg(t, ok) { 
        toast.innerText = t; toast.style.background = ok ? 'var(--y)' : 'var(--o)'; 
        toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 1200); 
    }

    function clear() { 
        clearInterval(loop); activeIntervals.forEach(clearInterval); activeIntervals = [];
        stage.innerHTML = ''; stage.onpointermove = null; stage.onpointerdown = null; 
    }

    const menu = [
        {id:'pb', icon:'⚾', t:'Blok Kırma'}, {id:'war', icon:'🚀', t:'Uzay Savaşı'},
        {id:'car', icon:'🏎️', t:'Araba Yarışı'}, {id:'memo', icon:'🧠', t:'Eşini Bul'},
        {id:'count', icon:'🍎', t:'Elmaları Say'}, {id:'draw', icon:'✍️', t:'Resim Yap'},
        {id:'sort', icon:'🎹', t:'Sayı Sırala'}, {id:'run', icon:'🏃', t:'Zıpla Kaç'}
    ];

    menu.forEach(m => {
        const d = document.createElement('div'); d.className = 'menu-item'; d.innerHTML = m.icon;
        d.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(x => x.classList.remove('active'));
            d.classList.add('active'); document.getElementById('instruction').innerText = m.t;
            play(m.id);
        };
        document.getElementById('navbar').appendChild(d);
    });

    function play(id) {
        clear();
        ptsDisp.innerText = score; lvlDisp.innerText = level;

        if(id === 'pb') { // PİN_BALL 30 SEVİYE
            let bx=150, by=250, dx=2.5+(level*0.2), dy=-2.5-(level*0.2);
            stage.innerHTML = `<div id="pad" style="position:absolute;bottom:10px;left:135px;width:80px;height:12px;background:var(--b);border-radius:10px"></div>
                               <div id="ball" style="position:absolute;width:14px;height:14px;background:var(--d);border-radius:50%"></div>`;
            const pad = stage.querySelector('#pad'), ball = stage.querySelector('#ball');
            let bricks = [];
            let rows = Math.min(3 + Math.floor(level/6), 7);
            for(let r=0; r<rows; r++) {
                for(let c=0; c<6; c++) {
                    const b = document.createElement('div'); b.className = 'brick';
                    let health = Math.floor(level/10) + 1; b.dataset.h = health;
                    b.style.width = '52px'; b.style.height = '14px';
                    b.style.left = (c*57 + 5) + 'px'; b.style.top = (r*18 + 40) + 'px';
                    b.style.background = health > 1 ? 'purple' : 'var(--p)';
                    stage.appendChild(b); bricks.push(b);
                }
            }
            stage.onpointermove = (e) => {
                let x = e.clientX - stage.getBoundingClientRect().left - 40;
                pad.style.left = Math.max(0, Math.min(x, stage.clientWidth - 80)) + 'px';
            };
            loop = setInterval(() => {
                bx += dx; by += dy;
                if(bx <= 0 || bx >= stage.clientWidth-14) dx *= -1;
                if(by <= 0) dy *= -1;
                if(by >= stage.clientHeight-35) {
                    let pr = pad.getBoundingClientRect(), br = ball.getBoundingClientRect();
                    if(br.right > pr.left && br.left < pr.right) { dy = -Math.abs(dy); }
                    else if(by > stage.clientHeight) { msg("Eyvah!", false); play('pb'); }
                }
                bricks.forEach((b, i) => {
                    let br = b.getBoundingClientRect(), blr = ball.getBoundingClientRect();
                    if(blr.bottom > br.top && blr.top < br.bottom && blr.right > br.left && blr.left < br.right) {
                        b.dataset.h--; dy *= -1;
                        if(b.dataset.h <= 0) { b.remove(); bricks.splice(i, 1); score += 10; ptsDisp.innerText = score; }
                        else { b.style.background = 'var(--p)'; }
                        if(bricks.length === 0) { level = Math.min(30, level+1); msg("Seviye " + level, true); play('pb'); }
                    }
                });
                ball.style.left = bx + 'px'; ball.style.top = by + 'px';
            }, 20);
        }

        else if(id === 'war') { // UZAY SAVAŞI 30 SEVİYE
            stage.style.background = '#000';
            stage.innerHTML = `<div id="ship" style="position:absolute;bottom:10px;left:145px;font-size:40px">🚀</div>`;
            const ship = stage.querySelector('#ship');
            stage.onpointerdown = () => {
                const l = document.createElement('div'); l.innerText='⚡'; l.className='game-obj';
                l.style.left = (ship.offsetLeft + 12) + 'px'; l.style.bottom = '50px'; stage.appendChild(l);
                let ly = 50;
                let lm = setInterval(() => {
                    ly += 10; l.style.bottom = ly + 'px';
                    stage.querySelectorAll('.enemy').forEach(e => {
                        let er = e.getBoundingClientRect(), lr = l.getBoundingClientRect();
                        if(lr.top < er.bottom && lr.left < er.right && lr.right > er.left) {
                            e.remove(); l.remove(); clearInterval(lm); score += 15; ptsDisp.innerText = score;
                            if(score % (200) === 0) { level = Math.min(30, level+1); msg("Seviye Atladın!", true); play('war'); }
                        }
                    });
                    if(ly > 400) { l.remove(); clearInterval(lm); }
                }, 20);
            };
            activeIntervals.push(setInterval(() => {
                const e = document.createElement('div'); e.className='enemy game-obj'; e.innerText='👾';
                e.style.top='-30px'; e.style.left=Math.random()*85+'%'; e.style.fontSize='30px';
                stage.appendChild(e);
                let ey = -30;
                let em = setInterval(() => {
                    ey += 2 + (level*0.3); e.style.top = ey + 'px';
                    if(ey > 400) { e.remove(); clearInterval(em); }
                }, 20);
            }, 1200 / (1 + level*0.1)));
        }

        else if(id === 'memo') { // HAFIZA
            let items = ['🦁','🦁','🐯','🐯','🦊','🦊','🐼','🐼','🐷','🐷','🐸','🐸','🐱','🐱','🐨','🐨'].sort(()=>Math.random()-0.5);
            let open = []; const g = document.createElement('div'); g.style.display='grid'; g.style.gridTemplateColumns='repeat(4,1fr)'; g.style.gap='5px'; g.style.padding='10px';
            items.forEach(v => {
                const t = document.createElement('div'); t.className = 'tile'; t.innerText = '?';
                t.onclick = () => {
                    if(open.length < 2 && t.innerText === '?') {
                        t.innerText = v; open.push(t);
                        if(open.length === 2) {
                            if(open[0].innerText === open[1].innerText) { score+=20; ptsDisp.innerText=score; msg("Harika!", true); open = []; }
                            else { setTimeout(() => { open.forEach(x => x.innerText = '?'); open = []; }, 600); }
                        }
                    }
                };
                g.appendChild(t);
            });
            stage.appendChild(g);
        }

        else if(id === 'count') { // SAYMA
            let n = Math.floor(Math.random()*5)+4;
            stage.innerHTML = `<div style="font-size:40px; margin:20px; text-align:center;">${'🍎'.repeat(n)}</div>`;
            [n, n+1, n-1].sort(()=>Math.random()-0.5).forEach(a => {
                const b = document.createElement('button'); b.style.cssText='display:block; width:80%; margin:10px auto; padding:15px; background:var(--p); color:white; border:none; border-radius:15px; font-size:20px;';
                b.innerText = a; b.onclick = () => { if(a === n) { score+=10; msg("Doğru!", true); play('count'); } else msg("Yeniden Say!", false); };
                stage.appendChild(b);
            });
        }

        else if(id === 'draw') { // ÇİZİM
            const can = document.createElement('canvas'); can.width=300; can.height=320; can.style.border="2px dashed var(--p)";
            const ctx = can.getContext('2d'); let d = false;
            const getP = (e) => { let r=can.getBoundingClientRect(); return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left, y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}; };
            can.onpointerdown=(e)=>{ d=true; ctx.beginPath(); let p=getP(e); ctx.moveTo(p.x,p.y); };
            can.onpointermove=(e)=>{ if(!d) return; let p=getP(e); ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle='#ff007f'; ctx.lineTo(p.x,p.y); ctx.stroke(); };
            window.onpointerup=()=>d=false;
            stage.appendChild(can);
            const btn = document.createElement('button'); btn.innerText="TEMİZLE"; btn.style.cssText="width:100%; padding:10px; background:var(--b); color:white; border:none;";
            btn.onclick=()=>ctx.clearRect(0,0,300,320); stage.appendChild(btn);
        }

        else if(id === 'sort') { // SIRALAMA
            let c = 1; let ns = Array.from({length: 16}, (_, i) => i + 1).sort(()=>Math.random()-0.5);
            const g = document.createElement('div'); g.style.display='grid'; g.style.gridTemplateColumns='repeat(4,1fr)'; g.style.gap='5px'; g.style.padding='10px';
            ns.forEach(n => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = n;
                b.onclick = () => {
                    if(n === c) { b.style.background = '#c8e6c9'; c++; if(c>16) { score+=50; msg("Süper!", true); play('sort'); } }
                    else { msg(c + " nerede?", false); }
                };
                g.appendChild(b);
            });
            stage.appendChild(g);
        }

        else { stage.innerHTML = `<h2 style="text-align:center; margin-top:100px; color:var(--p);">Oyun Başlıyor...</h2>`; }
    }
</script>
</body>
</html>
