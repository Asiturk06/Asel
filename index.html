<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Zeka Sarayı - FİNAL V3</title>
    <style>
        :root { --p: #ff007f; --s: #ffe4f1; --d: #ad1457; --w: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Comic Sans MS', cursive; background: var(--s); 
            margin: 0; padding: 0; height: 100vh; display: flex; 
            flex-direction: column; overflow: hidden;
        }
        
        header { background: var(--p); color: white; padding: 5px 0; flex-shrink: 0; text-align: center; }
        .asel-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        h1 { margin: 0; font-size: 14px; }

        /* 2 SATIRLI SABİT MENÜ */
        .nav-wrapper { 
            background: white; padding: 4px; border-bottom: 2px solid var(--p); 
            flex-shrink: 0; display: grid; 
            grid-template-columns: repeat(8, 1fr); gap: 3px;
        }
        .menu-item { 
            display: flex; justify-content: center; align-items: center; 
            padding: 8px 0; border: 1px solid #eee; border-radius: 8px; 
            background: #fffafa; font-size: 20px; cursor: pointer;
        }
        .menu-item.active { background: var(--p); border-color: var(--p); }

        /* OYUN SAHNESİ */
        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; justify-content: flex-start; }
        #instruction { font-weight: bold; color: var(--d); margin: 5px 0; font-size: 16px; height: 25px; }
        
        .game-card { 
            background: white; padding: 15px; border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; 
            min-height: 320px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative;
        }
        
        /* GRID YAPILARI */
        .grid-memory { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 100%; }
        .grid-find { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        .tile { 
            font-size: 22px; background: #fff0f6; border: 2px solid var(--p); 
            border-radius: 10px; height: 60px; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
        }
        
        .btn-ans { background: var(--d); color: white; border: none; padding: 10px 20px; border-radius: 15px; margin: 5px; font-size: 16px; font-weight: bold; width: 80%; }
        .emoji-big { font-size: 60px; margin: 10px; cursor: pointer; transition: 0.2s; }

        /* TOAST BİLDİRİM */
        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 25px; border-radius: 25px; font-size: 16px; font-weight: bold; 
            z-index: 9999; display: none; text-align: center; width: 80%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); animation: pop 0.3s ease-out;
        }
        .success { background: #4caf50; color: white; }
        .fail { background: #ff9800; color: white; }
        @keyframes pop { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast"></div>

<header>
    <img src="XFUT2204.JPG" onerror="this.src='https://via.placeholder.com/45/FF007F/FFFFFF?text=Asel'" class="asel-img">
    <h1>Asel'in Zeka Sarayı</h1>
</header>

<div class="nav-wrapper" id="navbar"></div>

<div id="game-view">
    <div id="instruction">Hadi Başlayalım Asel! ✨</div>
    <div class="game-card" id="stage">
        <div style="font-size: 80px;">🎯</div>
        <h3>Oyun Seçimi Yap</h3>
        <p>Yukarıdan bir ikon seç!</p>
    </div>
</div>

<script>
    const toast = document.getElementById('toast');
    const stage = document.getElementById('stage');
    const instruction = document.getElementById('instruction');

    function showMsg(msg, isOk) {
        toast.innerText = msg;
        toast.className = isOk ? 'success' : 'fail';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1800);
    }

    const games = [
        {id:'m1', icon:'🧠', t:'Eşini Bul!'}, {id:'m2', icon:'👀', t:'Farklıyı Bul!'},
        {id:'m3', icon:'🔢', t:'Toplama Yap!'}, {id:'m4', icon:'🎨', t:'Pembeyi Seç!'},
        {id:'m5', icon:'🍎', t:'Elmaları Say!'}, {id:'m6', icon:'📐', t:'Kare Nerede?'},
        {id:'m7', icon:'✍️', t:'Resim Yap!'}, {id:'m8', icon:'⬆️', t:'Yukarı Bak!'},
        {id:'m9', icon:'🦁', t:'Aslanı Bul!'}, {id:'m10', icon:'🎈', t:'Patlat!'},
        {id:'m11', icon:'🅰️', t:'A Harfi!'}, {id:'m12', icon:'🐭', t:'En Küçük?'},
        {id:'m13', icon:'😢', t:'Kim Üzgün?'}, {id:'m14', icon:'🎹', t:'1-16 Sırala!'},
        {id:'m15', icon:'🥦', t:'Sağlıklı Seç!'}
    ];

    // Menü Oluşturma
    const navbar = document.getElementById('navbar');
    games.forEach(g => {
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = g.icon;
        div.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            div.classList.add('active');
            instruction.innerText = g.t;
            initGame(g.id);
        };
        navbar.appendChild(div);
    });

    function initGame(id) {
        stage.innerHTML = ''; // Her seçimde sahneyi temizle
        
        switch(id) {
            case 'm1': // Hafıza
                let items = ['🦁','🦁','🐯','🐯','🦊','🦊','🐼','🐼','🐨','🐨','🐷','🐷','🐸','🐸','🐱','🐱'].sort(()=>Math.random()-0.5);
                let flip = [];
                const g1 = document.createElement('div'); g1.className = 'grid-memory';
                items.forEach(e => {
                    const b = document.createElement('div'); b.className = 'tile'; b.innerText = '?';
                    b.onclick = () => {
                        if(flip.length < 2 && b.innerText === '?') {
                            b.innerText = e; flip.push(b);
                            if(flip.length === 2) {
                                if(flip[0].innerText === flip[1].innerText) { showMsg("Süper! ✅", true); flip = []; }
                                else { setTimeout(() => { showMsg("Tekrar Dene! ✨", false); flip.forEach(x => x.innerText = '?'); flip = []; }, 600); }
                            }
                        }
                    };
                    g1.appendChild(b);
                });
                stage.appendChild(g1);
                break;

            case 'm2': // Farklı (3x4 Grid)
                const g2 = document.createElement('div'); g2.className = 'grid-find';
                let pool = Array(11).fill('🍓'); pool.push('🍒');
                pool.sort(()=>Math.random()-0.5).forEach(it => {
                    const b = document.createElement('div'); b.className = 'tile'; b.innerText = it; b.style.height = '75px';
                    b.onclick = () => { if(it==='🍒') { showMsg("Harika! 🍒", true); initGame('m2'); } else { showMsg("Hadi Bir Daha Bak! 🧐", false); } };
                    g2.appendChild(b);
                });
                stage.appendChild(g2);
                break;

            case 'm3': // Toplama
                let a = Math.floor(Math.random()*15)+5, b = Math.floor(Math.random()*10)+5;
                stage.innerHTML = `<h2 style="font-size:50px">${a}+${b}</h2>`;
                [a+b, a+b+2, a+b-1].sort(()=>Math.random()-0.5).forEach(ans => {
                    const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = ans;
                    btn.onclick = () => { if(ans === a+b) { showMsg("Dahisin! 🧠", true); initGame('m3'); } else { showMsg("Bir Daha Dene! 🚀", false); } };
                    stage.appendChild(btn);
                });
                break;

            case 'm5': // Sayma (Taşma engellendi)
                let n = Math.floor(Math.random()*6)+3;
                let ctn = document.createElement('div');
                ctn.innerHTML = `<div style="font-size:35px; margin-bottom:15px; display:flex; flex-wrap:wrap; justify-content:center;">${'🍎'.repeat(n)}</div>`;
                [n, n+1, n-2].sort(()=>Math.random()-0.5).forEach(ans => {
                    const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = ans;
                    btn.onclick = () => { if(ans === n) { showMsg(`Doğru! Tam ${n} Tane! 🍎`, true); initGame('m5'); } else { showMsg("Tekrar Sayalım mı? 🔢", false); } };
                    ctn.appendChild(btn);
                });
                stage.appendChild(ctn);
                break;

            case 'm14': // Sıralama
                let count = 1; let ns = Array.from({length: 16}, (_, i) => i + 1).sort(()=>Math.random()-0.5);
                const g14 = document.createElement('div'); g14.className = 'grid-memory';
                ns.forEach(n => {
                    const b = document.createElement('div'); b.className = 'tile'; b.innerText = n; b.style.height = '55px';
                    b.onclick = () => { 
                        if(n === count) { b.style.background = '#c8e6c9'; count++; if(count>16){showMsg("Hepsini Bildin! 👑", true); initGame('m14');} }
                        else { showMsg(`${count} Nerede Asel? 🔢`, false); }
                    };
                    g14.appendChild(b);
                });
                stage.appendChild(g14);
                break;

            case 'm7': // Çizim
                const can = document.createElement('canvas'); can.width=280; can.height=280; can.style.border="2px dashed #ff007f";
                const ctx = can.getContext('2d'); let draw=false;
                const getP = (e) => { const r=can.getBoundingClientRect(); return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left, y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}; };
                can.onmousedown=can.ontouchstart=(e)=>{ draw=true; ctx.beginPath(); const p=getP(e); ctx.moveTo(p.x,p.y); };
                can.onmousemove=can.ontouchmove=(e)=>{ if(!draw)return; const p=getP(e); ctx.lineWidth=5; ctx.lineCap='round'; ctx.strokeStyle='#ff007f'; ctx.lineTo(p.x,p.y); ctx.stroke(); };
                window.onmouseup=window.ontouchend=()=>draw=false;
                stage.appendChild(can);
                const clr = document.createElement('button'); clr.className='btn-ans'; clr.innerText='Temizle'; clr.onclick=()=>ctx.clearRect(0,0,280,280);
                stage.appendChild(clr);
                break;

            default: // Diğer Eşleme Oyunları (Yön, Hayvan, Renk vb.)
                const map = {
                    'm4':[['🌸',true],['💎',false],['🍀',false]], 'm6':[['⬛',true],['🔺',false],['🟡',false]],
                    'm8':[['⬆️',true],['⬇️',false],['⬅️',false]], 'm9':[['🦁',true],['🐶',false],['🐱',false]],
                    'm11':[['A',true],['B',false],['C',false]], 'm12':[['🐭',true],['🐘',false],['🦒',false]],
                    'm13':[['😢',true],['😊',false],['😡',false]], 'm15':[['🥦',true],['🍭',false],['🍟',false]],
                    'm10':[['🎈',true]]
                };
                const gameData = map[id];
                gameData.forEach(item => {
                    const eb = document.createElement('div'); eb.className = 'emoji-big'; eb.innerText = item[0];
                    eb.onclick = () => { 
                        if(item[1]) { showMsg("Harika! Doğru! 🌟", true); initGame(id); }
                        else { showMsg("Bir Daha Dene Asel! ✨", false); }
                    };
                    stage.appendChild(eb);
                });
        }
    }
</script>
</body>
</html>
