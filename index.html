<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Aksiyon Sarayı 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --s: #fff0f6; --d: #ad1457; --y: #4caf50; --o: #ff9800; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Varela Round', sans-serif; }
        
        body { 
            background: var(--s); margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        header { background: var(--p); color: white; padding: 5px 0; text-align: center; flex-shrink: 0; }
        .asel-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        h1 { margin: 0; font-size: 14px; letter-spacing: 1px; }

        /* 2 SATIRLI MENÜ */
        .nav-wrapper { 
            background: white; padding: 4px; border-bottom: 3px solid var(--p); 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; flex-shrink: 0;
        }
        .menu-item { 
            display: flex; justify-content: center; align-items: center; 
            padding: 8px 0; border-radius: 10px; border: 1px solid #ffe0ef;
            background: #fff; font-size: 20px; cursor: pointer;
        }
        .menu-item.active { background: var(--p); border-color: var(--p); transform: scale(0.9); }

        /* OYUN ALANI */
        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; justify-content: flex-start; position: relative; }
        #instruction { font-weight: bold; color: var(--d); margin: 5px 0; font-size: 16px; min-height: 24px; }
        
        .game-card { 
            background: white; padding: 15px; border-radius: 25px; 
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.1); width: 100%; max-width: 350px; 
            height: 100%; max-height: 400px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; overflow: hidden;
            touch-action: none;
        }
        
        .tile { 
            font-size: 22px; background: #fffafc; border: 2px solid #ffd1e6; 
            border-radius: 12px; height: 60px; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 3px 0 #ffd1e6;
        }

        .action-obj { position: absolute; font-size: 50px; cursor: pointer; transition: transform 0.1s; }
        
        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 25px; border-radius: 25px; font-size: 18px; font-weight: bold; 
            z-index: 9999; display: none; text-align: center; width: 80%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success { background: var(--y); color: white; }
        .fail { background: var(--o); color: white; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast"></div>

<header>
    <img src="XFUT2204.JPG" onerror="this.src='https://via.placeholder.com/50/FF007F/FFFFFF?text=Asel'" class="asel-img">
    <h1>Asel'in Aksiyon Sarayı</h1>
</header>

<div class="nav-wrapper" id="navbar"></div>

<div id="game-view">
    <div id="instruction">Hazır mısın Asel? 🚀</div>
    <div class="game-card" id="stage">
        <div style="font-size: 70px;">⚡</div>
        <h2 style="color:var(--p);">Hızlanma Vakti!</h2>
        <p style="font-size:14px; color:#777;">Bir aksiyon oyunu seç!</p>
    </div>
</div>

<script>
    const toast = document.getElementById('toast');
    const stage = document.getElementById('stage');
    const instr = document.getElementById('instruction');
    let gameInterval;

    function showMsg(msg, isOk) {
        toast.innerText = msg;
        toast.className = isOk ? 'success' : 'fail';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1500);
    }

    const games = [
        {id:'m1', icon:'🧠', t:'Aynı Kartları Bul!'},
        {id:'m2', icon:'👀', t:'Farklıyı Yakala!'},
        {id:'m5', icon:'🍎', t:'Elmaları Say!'},
        {id:'m7', icon:'✍️', t:'Resim Yapalım!'},
        {id:'m10', icon:'🎈', t:'Balonu Patlat!'},
        {id:'m14', icon:'🎹', t:'1-16 Sırala!'},
        {id:'m15', icon:'🥦', t:'Sağlıklı Olan?'},
        {id:'m_star', icon:'⭐', t:'Yıldızları Yakala!'},
        {id:'m_egg', icon:'🥚', t:'Yumurtaları Sepete Topla!'},
        {id:'m_mole', icon:'🐭', t:'Köstebek Vurmaca!'},
        {id:'m_gift', icon:'🎁', t:'Hediyeleri Kaçırma!'},
        {id:'m_fish', icon:'🐟', t:'Balıkları Kurtar!'},
        {id:'m_ufo', icon:'🛸', t:'UFO\'ya Dokun!'},
        {id:'m_rain', icon:'💧', t:'Yağmur Damlaları!'},
        {id:'m_cat', icon:'🐱', t:'Kediyi Yakala!'}
    ];

    const navbar = document.getElementById('navbar');
    games.forEach(g => {
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = g.icon;
        div.onclick = () => {
            clearInterval(gameInterval);
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            div.classList.add('active');
            instr.innerText = g.t;
            initGame(g.id);
        };
        navbar.appendChild(div);
    });

    function initGame(id) {
        stage.innerHTML = '';
        
        if(id === 'm_star' || id === 'm_ufo' || id === 'm_cat' || id === 'm10') { // Dokunma Aksiyonları
            const emoji = {m_star:'⭐', m_ufo:'🛸', m_cat:'🐱', m10:'🎈'}[id];
            const spawn = () => {
                stage.innerHTML = '';
                const el = document.createElement('div');
                el.className = 'action-obj';
                el.innerText = emoji;
                el.style.left = Math.random() * 80 + 5 + '%';
                el.style.top = Math.random() * 80 + 5 + '%';
                el.onclick = () => {
                    el.innerText = '✨';
                    showMsg("Harikasın! ⚡", true);
                    setTimeout(spawn, 400);
                };
                stage.appendChild(el);
            };
            spawn();
        } 
        else if(id === 'm_egg') { // Yumurta Yakalama
            let score = 0;
            const basket = document.createElement('div');
            basket.innerHTML = '🧺';
            basket.style.position = 'absolute';
            basket.style.bottom = '10px';
            basket.style.fontSize = '60px';
            basket.style.left = '50%';
            stage.appendChild(basket);

            stage.ontouchmove = (e) => {
                let rect = stage.getBoundingClientRect();
                let x = (e.touches[0].clientX - rect.left) - 30;
                basket.style.left = Math.max(0, Math.min(x, rect.width - 60)) + 'px';
            };

            gameInterval = setInterval(() => {
                const egg = document.createElement('div');
                egg.innerText = '🥚';
                egg.style.position = 'absolute';
                egg.style.top = '0';
                egg.style.fontSize = '40px';
                let startX = Math.random() * (stage.clientWidth - 40);
                egg.style.left = startX + 'px';
                stage.appendChild(egg);

                let pos = 0;
                let fall = setInterval(() => {
                    pos += 5;
                    egg.style.top = pos + 'px';
                    let bRect = basket.getBoundingClientRect();
                    let eRect = egg.getBoundingClientRect();

                    if(eRect.bottom >= bRect.top && eRect.left < bRect.right && eRect.right > bRect.left) {
                        showMsg("Yakaladın! 🥚", true);
                        egg.remove();
                        clearInterval(fall);
                    }
                    if(pos > stage.clientHeight) { egg.remove(); clearInterval(fall); }
                }, 30);
            }, 1500);
        }
        else if(id === 'm1') { // Hafıza (Klasiklerden kalan)
            let items = ['🦁','🦁','🐯','🐯','🦊','🦊','🐼','🐼','🐷','🐷','🐸','🐸','🐱','🐱','🐨','🐨'].sort(()=>Math.random()-0.5);
            let flip = [];
            const g1 = document.createElement('div'); g1.className = 'grid-4x4';
            items.forEach(e => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = '?';
                b.onclick = () => {
                    if(flip.length < 2 && b.innerText === '?') {
                        b.innerText = e; flip.push(b);
                        if(flip.length === 2) {
                            if(flip[0].innerText === flip[1].innerText) { showMsg("Süper! ✅", true); flip = []; }
                            else { setTimeout(() => { showMsg("Hadi Tekrar! ✨", false); flip.forEach(x => x.innerText = '?'); flip = []; }, 600); }
                        }
                    }
                };
                g1.appendChild(b);
            });
            stage.appendChild(g1);
        }
        else if(id === 'm14') { // Sıralama
            let count = 1; let ns = Array.from({length: 16}, (_, i) => i + 1).sort(()=>Math.random()-0.5);
            const g14 = document.createElement('div'); g14.className = 'grid-4x4';
            ns.forEach(num => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = num;
                b.onclick = () => { 
                    if(num === count) { b.style.background = '#c8e6c9'; count++; if(count>16){showMsg("Kraliçesin! 👑", true); initGame('m14');} }
                    else { showMsg(`${count} Nerede Asel? 🔢`, false); }
                };
                g14.appendChild(b);
            });
            stage.appendChild(g14);
        }
        else if(id === 'm_mole') { // Köstebek
            gameInterval = setInterval(() => {
                stage.innerHTML = '';
                const mole = document.createElement('div');
                mole.innerText = '🐭';
                mole.className = 'action-obj';
                mole.style.left = Math.random() * 70 + 10 + '%';
                mole.style.top = Math.random() * 70 + 10 + '%';
                mole.onclick = () => { mole.innerText = '😵'; showMsg("Vurdun! ✅", true); };
                stage.appendChild(mole);
            }, 1000);
        }
        else if(id === 'm7') { // Çizim
            const can = document.createElement('canvas'); can.width=280; can.height=280; can.style.border="3px dashed var(--p)"; can.style.borderRadius="15px";
            const ctx = can.getContext('2d'); let drw=false;
            const getP = (e) => { const r=can.getBoundingClientRect(); return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left, y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}; };
            can.onmousedown=can.ontouchstart=(e)=>{ drw=true; ctx.beginPath(); const p=getP(e); ctx.moveTo(p.x,p.y); };
            can.onmousemove=can.ontouchmove=(e)=>{ if(!drw)return; const p=getP(e); ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle='#ff007f'; ctx.lineTo(getP(e).x,getP(e).y); ctx.stroke(); };
            window.onmouseup=window.ontouchend=()=>drw=false;
            stage.appendChild(can);
        }
        else { // Diğerleri
             stage.innerHTML = `<div style="font-size:80px">🎮</div><h3>Yeni Görev!</h3>`;
        }
    }
</script>
</body>
</html>
