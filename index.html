<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Zeka Sarayı</title>
    <style>
        :root { --p: #ff007f; --s: #ffe4f1; --d: #ad1457; --w: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Comic Sans MS', cursive; background: var(--s); 
            margin: 0; padding: 0; text-align: center; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        header { background: var(--p); color: white; padding: 5px 0; flex-shrink: 0; }
        .asel-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        h1 { margin: 0; font-size: 14px; }

        /* 2 SATIRLI SABİT MENÜ */
        .nav-wrapper { 
            background: white; padding: 5px; border-bottom: 2px solid var(--p); 
            flex-shrink: 0; display: grid; 
            grid-template-columns: repeat(8, 1fr); gap: 4px;
        }
        .menu-item { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 3px; border: 1px solid #ddd; border-radius: 6px; 
            background: #fffafa; cursor: pointer;
        }
        .menu-item.active { background: var(--p); color: white; border-color: var(--p); }
        .menu-item span { font-size: 18px; }
        .menu-item small { display: none; } /* Alan kazanmak için isimleri gizledik, ikonlar yeterli */

        /* OYUN ALANI */
        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; justify-content: center; overflow: hidden; }
        #instruction { font-weight: bold; color: var(--d); margin-bottom: 8px; font-size: 16px; min-height: 20px; }
        
        .game-card { 
            background: white; padding: 10px; border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 360px; 
            height: 100%; max-height: 400px; margin: 0 auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* OYUN İÇİ GRİDLER (Taşmayı önlemek için ayarlandı) */
        .grid-4x4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
        .tile { 
            font-size: 24px; background: #fff0f6; border: 2px solid var(--p); 
            border-radius: 12px; height: 65px; display: flex; 
            align-items: center; justify-content: center;
        }
        
        /* Emoji ve Buton Boyutları */
        .emoji-wrap { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .emoji-btn { font-size: 50px; cursor: pointer; transition: 0.2s; padding: 10px; }
        .btn-ans { background: var(--d); color: white; border: none; padding: 12px 25px; border-radius: 15px; margin: 5px; font-size: 18px; font-weight: bold; }

        /* TOAST */
        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 25px; border-radius: 25px; font-size: 16px; font-weight: bold; 
            z-index: 2000; display: none; text-align: center; width: 80%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); animation: pop 0.3s ease-out;
        }
        .success { background: #4caf50; color: white; }
        .fail { background: #ff9800; color: white; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.7); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast"></div>

<header>
    <img src="XFUT2204.JPG" onerror="this.src='https://via.placeholder.com/50/FF007F/FFFFFF?text=Asel'" class="asel-img">
    <h1>Asel'in Zeka Sarayı</h1>
</header>

<div class="nav-wrapper" id="navbar"></div>

<div id="game-view">
    <div id="instruction">Oyun Seç Asel! ✨</div>
    <div class="game-card" id="stage">
        <div style="font-size: 60px;">👑</div>
        <h3 style="margin: 5px;">Hoş Geldin Asel!</h3>
        <p style="font-size: 14px;">Zekanı göstermeye hazır mısın?</p>
    </div>
</div>

<script>
    const toast = document.getElementById('toast');
    function showMsg(msg, isOk) {
        toast.innerText = msg;
        toast.className = isOk ? 'success' : 'fail';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1800);
    }

    const games = [
        {id:'m1', icon:'🧠', t:'Eşini Bul!'}, {id:'m2', icon:'👀', t:'Farklıyı Bul!'},
        {id:'m3', icon:'🔢', t:'Toplama Yap!'}, {id:'m4', icon:'🎨', t:'Pembeyi Seç!'},
        {id:'m5', icon:'🍎', t:'Elmaları Say!'}, {id:'m6', icon:'📐', t:'Kare Nerede?'},
        {id:'m7', icon:'✍️', t:'Resim Yap!'}, {id:'m8', icon:'⬆️', t:'Yukarı Bak!'},
        {id:'m9', icon:'🦁', t:'Aslanı Bul!'}, {id:'m10', icon:'🎈', t:'Patlat!'},
        {id:'m11', icon:'🅰️', t:'A Harfi!'}, {id:'m12', icon:'🐘', t:'En Küçük?'},
        {id:'m13', icon:'😊', t:'Kim Üzgün?'}, {id:'m14', icon:'🎹', t:'1-16 Sırala!'},
        {id:'m15', icon:'🥦', t:'Sağlıklı Seç!'}, {id:'m16', icon:'⭐', t:'Süper Başlangıç!'}
    ];

    const navbar = document.getElementById('navbar');
    const stage = document.getElementById('stage');

    games.forEach(g => {
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = `<span>${g.icon}</span>`;
        div.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            div.classList.add('active');
            document.getElementById('instruction').innerText = g.t;
            play(g.id);
        };
        navbar.appendChild(div);
    });

    function play(id) {
        stage.innerHTML = '';
        
        if(id === 'm2') { // FARKLIYI BUL (Taşma engellendi - 3x4 grid)
            const grid = document.createElement('div'); 
            grid.style.display = 'grid'; grid.style.gridTemplateColumns = 'repeat(3, 1fr)'; grid.style.gap = '10px';
            let pool = Array(11).fill('🍓'); pool.push('🍒');
            pool.sort(()=>Math.random()-0.5).forEach(it => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = it; b.style.height = '80px';
                b.onclick = () => { 
                    if(it==='🍒') { showMsg("Harika! Farklıyı Buldun! 🍒", true); play('m2'); }
                    else { showMsg("Hadi Bir Daha Bak! 🧐", false); }
                };
                grid.appendChild(b);
            });
            stage.appendChild(grid);
        } 
        else if(id === 'm5') { // SAYMA (Netleştirildi)
            let n = Math.floor(Math.random()*6)+3;
            const wrap = document.createElement('div');
            wrap.innerHTML = `<div style="font-size:35px; margin-bottom:20px; display:flex; flex-wrap:wrap; justify:center; gap:5px;">${'🍎'.repeat(n)}</div>`;
            [n, n+1, n-1].sort(()=>Math.random()-0.5).forEach(ans => {
                const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = ans;
                btn.onclick = () => {
                    if(ans === n) { showMsg(`Doğru! Tam ${n} Tane! 🍎`, true); play('m5'); }
                    else { showMsg("Tekrar Sayalım mı? 🔢", false); }
                };
                wrap.appendChild(btn);
            });
            stage.appendChild(wrap);
        }
        else if(id === 'm1') { // HAFIZA (4x4)
            let items = ['🦁','🦁','🐯','🐯','🦊','🦊','🐼','🐼','🐨','🐨','🐷','🐷','🐸','🐸','🐱','🐱'].sort(()=>Math.random()-0.5);
            let flipped = [];
            const grid = document.createElement('div'); grid.className = 'grid-4x4';
            items.forEach(e => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = '?';
                b.onclick = () => {
                    if(flipped.length < 2 && b.innerText === '?') {
                        b.innerText = e; flipped.push(b);
                        if(flipped.length === 2) {
                            if(flipped[0].innerText === flipped[1].innerText) { showMsg("Süper! ✅", true); flipped = []; }
                            else { setTimeout(() => { showMsg("Tekrar Dene! ✨", false); flipped.forEach(x => x.innerText = '?'); flipped = []; }, 600); }
                        }
                    }
                };
                grid.appendChild(b);
            });
            stage.appendChild(grid);
        }
        else if(id === 'm3') { // TOPLAMA
            let a = Math.floor(Math.random()*15)+5, b = Math.floor(Math.random()*10)+5;
            stage.innerHTML = `<h2 style="font-size:50px">${a}+${b}</h2>`;
            [a+b, a+b+2, a+b-1].sort(()=>Math.random()-0.5).forEach(ans => {
                const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = ans;
                btn.onclick = () => { if(ans === a+b) { showMsg("Dahisin! 🧠", true); play('m3'); } else { showMsg("Bir Daha Dene! 🚀", false); } };
                stage.appendChild(btn);
            });
        }
        else if(id === 'm14') { // SIRALAMA
            let cur = 1; let ns = Array.from({length: 16}, (_, i) => i + 1).sort(()=>Math.random()-0.5);
            const g = document.createElement('div'); g.className = 'grid-4x4';
            ns.forEach(n => {
                const b = document.createElement('div'); b.className = 'tile'; b.innerText = n; b.style.height = '60px';
                b.onclick = () => { 
                    if(n === cur) { b.style.background = '#c8e6c9'; cur++; if(cur>16){showMsg("Kraliçesin! 👑", true); play('m14');} }
                    else { showMsg(`${cur} Nerede? 🔢`, false); }
                };
                g.appendChild(b);
            });
            stage.appendChild(g);
        }
        else { // DİĞER EŞLEME OYUNLARI
            const data = {
                'm4':[['🌸',true],['💎',false],['🍀',false]], 'm6':[['⬛',true],['🔺',false],['🟡',false]],
                'm8':[['⬆️',true],['⬇️',false],['➡️',false]], 'm9':[['🦁',true],['🐶',false],['🐱',false]],
                'm11':[['A',true],['B',false],['C',false]], 'm12':[['🐭',true],['🐘',false],['🐯',false]],
                'm13':[['😢',true],['😊',false],['😡',false]], 'm15':[['🥦',true],['🍭',false],['🍕',false]],
                'm10':[['🎈',true]], 'm16':[['⭐',true]]
            }[id];
            const wrap = document.createElement('div'); wrap.className = 'emoji-wrap';
            data.forEach(item => {
                const b = document.createElement('div'); b.className = 'emoji-btn'; b.innerText = item[0];
                b.onclick = () => { 
                    if(item[1]) { showMsg("Harika! Doğru! 🌟", true); play(id); }
                    else { showMsg("Bir Daha Dene Asel! ✨", false); }
                };
                wrap.appendChild(b);
            });
            stage.appendChild(wrap);
        }
    }
</script>
</body>
</html>
