<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asel'in Zeka Sarayı 💖</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff007f; --s: #fff0f6; --d: #ad1457; --y: #4caf50; --o: #ff9800; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Varela Round', sans-serif; }
        
        body { 
            background: var(--s); margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        header { background: var(--p); color: white; padding: 5px 0; text-align: center; flex-shrink: 0; }
        .asel-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; object-fit: cover; }
        h1 { margin: 0; font-size: 14px; letter-spacing: 1px; }

        /* 2 SATIRLI RENKLİ MENÜ */
        .nav-wrapper { 
            background: white; padding: 4px; border-bottom: 3px solid var(--p); 
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; flex-shrink: 0;
        }
        .menu-item { 
            display: flex; justify-content: center; align-items: center; 
            padding: 8px 0; border-radius: 10px; border: 1px solid #ffe0ef;
            background: #fff; font-size: 20px; cursor: pointer;
        }
        .menu-item.active { background: var(--p); border-color: var(--p); transform: scale(0.9); }

        /* OYUN ALANI */
        #game-view { flex-grow: 1; display: flex; flex-direction: column; padding: 10px; align-items: center; justify-content: flex-start; }
        #instruction { font-weight: bold; color: var(--d); margin: 5px 0; font-size: 16px; min-height: 24px; }
        
        .game-card { 
            background: white; padding: 15px; border-radius: 25px; 
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.1); width: 100%; max-width: 350px; 
            height: 100%; max-height: 400px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        
        /* GRID YAPILARI */
        .grid-4x4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 100%; }
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        
        .tile { 
            font-size: 22px; background: #fffafc; border: 2px solid #ffd1e6; 
            border-radius: 12px; height: 60px; display: flex; 
            align-items: center; justify-content: center; box-shadow: 0 3px 0 #ffd1e6;
        }
        .tile:active { transform: translateY(2px); box-shadow: none; }
        
        .btn-ans { 
            background: var(--p); color: white; border: none; padding: 12px; 
            border-radius: 15px; margin: 5px; font-size: 18px; font-weight: bold; 
            width: 80%; box-shadow: 0 4px 0 var(--d);
        }

        .emoji-btn { font-size: 65px; cursor: pointer; transition: 0.2s; }

        /* TOAST */
        #toast {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            padding: 15px 25px; border-radius: 25px; font-size: 18px; font-weight: bold; 
            z-index: 9999; display: none; text-align: center; width: 80%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success { background: var(--y); color: white; }
        .fail { background: var(--o); color: white; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast"></div>

<header>
    <img src="XFUT2204.JPG" onerror="this.src='https://via.placeholder.com/50/FF007F/FFFFFF?text=Asel'" class="asel-img">
    <h1>Asel'in Zeka Sarayı</h1>
</header>

<div class="nav-wrapper" id="navbar"></div>

<div id="game-view">
    <div id="instruction">Hoş Geldin Asel! ✨</div>
    <div class="game-card" id="stage">
        <div style="font-size: 70px;">🌈</div>
        <h2 style="color:var(--p);">Hadi Başlayalım!</h2>
        <p style="font-size:14px; color:#777;">Bir oyun seç ve eğlen!</p>
    </div>
</div>

<script>
    const toast = document.getElementById('toast');
    const stage = document.getElementById('stage');
    const instr = document.getElementById('instruction');

    function showMsg(msg, isOk) {
        toast.innerText = msg;
        toast.className = isOk ? 'success' : 'fail';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 1800);
    }

    const games = [
        {id:'m1', icon:'🧠', t:'Aynı Kartları Bul!'}, {id:'m2', icon:'👀', t:'Farklıyı Yakala!'},
        {id:'m3', icon:'🔢', t:'Sayıları Toplayalım!'}, {id:'m4', icon:'🌸', t:'Pembeyi Seç!'},
        {id:'m5', icon:'🍎', t:'Hadi Elmaları Say!'}, {id:'m6', icon:'⬛', t:'Kare Nerede?'},
        {id:'m7', icon:'✍️', t:'Resim Yapalım!'}, {id:'m8', icon:'⬆️', t:'Yukarı Bakan Ok?'},
        {id:'m9', icon:'🦁', t:'Aslanı Bul!'}, {id:'m10', icon:'🎈', t:'Balonu Yakala!'},
        {id:'m11', icon:'🅰️', t:'A Harfi Hangisi?'}, {id:'m12', icon:'🐭', t:'En Küçük Hayvan?'},
        {id:'m13', icon:'😢', t:'Üzgün Olan Kim?'}, {id:'m14', icon:'🎹', t:'1-16 Sırala!'},
        {id:'m15', icon:'🥦', t:'Sağlıklı Olan?'}
    ];

    const navbar = document.getElementById('navbar');
    games.forEach(g => {
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = g.icon;
        div.onclick = () => {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            div.classList.add('active');
            instr.innerText = g.t;
            initGame(g.id);
        };
        navbar.appendChild(div);
    });

    function initGame(id) {
        stage.innerHTML = '';
        
        switch(id) {
            case 'm1': // Hafıza
                let items = ['🦁','🦁','🐯','🐯','🦊','🦊','🐼','🐼','🐷','🐷','🐸','🐸','🐱','🐱','🐨','🐨'].sort(()=>Math.random()-0.5);
                let flip = [];
                const g1 = document.createElement('div'); g1.className = 'grid-4x4';
                items.forEach(e => {
                    const b = document.createElement('div'); b.className = 'tile'; b.innerText = '?';
                    b.onclick = () => {
                        if(flip.length < 2 && b.innerText === '?') {
                            b.innerText = e; flip.push(b);
                            if(flip.length === 2) {
                                if(flip[0].innerText === flip[1].innerText) { showMsg("Harika! ✅", true); flip = []; }
                                else { setTimeout(() => { showMsg("Tekrar Dene! ✨", false); flip.forEach(x => x.innerText = '?'); flip = []; }, 600); }
                            }
                        }
                    };
                    g1.appendChild(b);
                });
                stage.appendChild(g1);
                break;

            case 'm2': // Farklıyı Bul
                const g2 = document.createElement('div'); g2.className = 'grid-3x3';
                let p2 = Array(8).fill('🍓'); p2.push('🍒');
                p2.sort(()=>Math.random()-0.5).forEach(it => {
                    const b = document.createElement('div'); b.className = 'tile'; b.innerText = it; b.style.height='85px';
                    b.onclick = () => { if(it==='🍒') { showMsg("Bulduun! 🍒", true); initGame('m2'); } else { showMsg("Hadi Bir Daha Bak! 🧐", false); } };
                    g2.appendChild(b);
                });
                stage.appendChild(g2);
                break;

            case 'm3': // Matematik
                let a = Math.floor(Math.random()*15)+5, b = Math.floor(Math.random()*10)+5;
                stage.innerHTML = `<h2 style="font-size:55px; color:var(--p);">${a}+${b}</h2>`;
                [a+b, a+b+2, a+b-1].sort(()=>Math.random()-0.5).forEach(ans => {
                    const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = ans;
                    btn.onclick = () => { if(ans === a+b) { showMsg("Zeka Küpü! 🧠", true); initGame('m3'); } else { showMsg("Neredeyse Oluyordu! 🚀", false); } };
                    stage.appendChild(btn);
                });
                break;

            case 'm5': // Sayma
                let n = Math.floor(Math.random()*5)+4;
                let c5 = document.createElement('div');
                c5.innerHTML = `<div style="font-size:38px; margin-bottom:15px; display:flex; flex-wrap:wrap; justify-content:center;">${'🍎'.repeat(n)}</div>`;
                [n, n+1, n-1].sort(()=>Math.random()-0.5).forEach(ans => {
                    const btn = document.createElement('button'); btn.className = 'btn-ans'; btn.innerText = ans;
                    btn.onclick = () => { if(ans === n) { showMsg(`Doğru! Tam ${n} Elma! 🍎`, true); initGame('m5'); } else { showMsg("Hadi Bir Daha Say! 🔢", false); } };
                    c5.appendChild(btn);
                });
                stage.appendChild(c5);
                break;

            case 'm10': // Balon (Rastgele Konumlu)
                const bal = document.createElement('div');
                bal.className = 'emoji-btn'; bal.innerText = '🎈';
                bal.style.position = 'absolute';
                bal.style.left = (10 + Math.random() * 60) + '%';
                bal.style.top = (10 + Math.random() * 60) + '%';
                bal.onclick = () => { 
                    bal.innerText = '💥'; showMsg("GÜÜÜM! 💥", true); 
                    setTimeout(() => initGame('m10'), 500); 
                };
                stage.appendChild(bal);
                break;

            case 'm14': // Sıralama
                let count = 1; let ns = Array.from({length: 16}, (_, i) => i + 1).sort(()=>Math.random()-0.5);
                const g14 = document.createElement('div'); g14.className = 'grid-4x4';
                ns.forEach(num => {
                    const b = document.createElement('div'); b.className = 'tile'; b.innerText = num;
                    b.onclick = () => { 
                        if(num === count) { b.style.background = '#c8e6c9'; count++; if(count>16){showMsg("Hepsini Sıraladın! 👑", true); initGame('m14');} }
                        else { showMsg(`${count} Nerede Asel? 🔢`, false); }
                    };
                    g14.appendChild(b);
                });
                stage.appendChild(g14);
                break;

            case 'm7': // Çizim
                const can = document.createElement('canvas'); can.width=280; can.height=280; can.style.border="3px dashed var(--p)"; can.style.borderRadius="15px";
                const ctx = can.getContext('2d'); let drw=false;
                const getP = (e) => { const r=can.getBoundingClientRect(); return {x:(e.touches?e.touches[0].clientX:e.clientX)-r.left, y:(e.touches?e.touches[0].clientY:e.clientY)-r.top}; };
                can.onmousedown=can.ontouchstart=(e)=>{ drw=true; ctx.beginPath(); const p=getP(e); ctx.moveTo(p.x,p.y); };
                can.onmousemove=can.ontouchmove=(e)=>{ if(!drw)return; const p=getP(e); ctx.lineWidth=6; ctx.lineCap='round'; ctx.strokeStyle='#ff007f'; ctx.lineTo(getP(e).x,getP(e).y); ctx.stroke(); };
                window.onmouseup=window.ontouchend=()=>drw=false;
                stage.appendChild(can);
                const cl = document.createElement('button'); cl.className='btn-ans'; cl.innerText='SİL VE YENİDEN YAP'; cl.onclick=()=>ctx.clearRect(0,0,280,280);
                stage.appendChild(cl);
                break;

            default: // Diğer Eşleme Oyunları (Her Seferinde Karışır)
                const data = {
                    'm4': [['🌸',true],['💎',false],['🍀',false]], 'm6': [['⬛',true],['🔺',false],['🟡',false]],
                    'm8': [['⬆️',true],['⬇️',false],['➡️',false]], 'm9': [['🦁',true],['🐶',false],['🐱',false]],
                    'm11': [['A',true],['B',false],['C',false]], 'm12': [['🐭',true],['🐘',false],['🦒',false]],
                    'm13': [['😢',true],['😊',false],['😴',false]], 'm15': [['🥦',true],['🍕',false],['🍭',false]]
                }[id];
                
                let shuffled = [...data].sort(()=>Math.random()-0.5);
                shuffled.forEach(item => {
                    const eb = document.createElement('div'); eb.className = 'emoji-btn'; eb.innerText = item[0];
                    eb.onclick = () => { 
                        if(item[1]) { showMsg("Doğru! Tebrikler! ✨", true); initGame(id); }
                        else { showMsg("Tekrar Dene Asel! ✨", false); }
                    };
                    stage.appendChild(eb);
                });
        }
    }
</script>
</body>
</html>
